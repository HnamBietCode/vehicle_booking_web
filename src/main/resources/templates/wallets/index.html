<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Ví Điện Tử | Đặt Xe</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* BASE CSS */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --secondary: #7C3AED;
            --accent: #F59E0B;
            --danger: #EF4444;
            --success: #10B981;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text: #1E293B;
            --muted: #64748B;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .navbar-brand::before {
            content: '🚗';
            font-size: 1.4rem;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: .25rem;
            margin-left: auto;
            list-style: none;
        }

        .nav-link {
            padding: .5rem .85rem;
            border-radius: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: .9rem;
            font-weight: 500;
            transition: all .2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary);
            color: #fff;
        }

        .nav-badge {
            background: var(--accent);
            color: #fff;
            font-size: .7rem;
            padding: .15rem .45rem;
            border-radius: 999px;
            margin-left: .3rem;
            font-weight: 700;
        }

        .alert {
            padding: .85rem 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            font-size: .9rem;
            font-weight: 500;
        }

        .alert-danger {
            background: #FEF2F2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
        }

        .alert-success {
            background: #F0FDF4;
            color: #166534;
            border-left: 4px solid var(--success);
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-label {
            display: block;
            font-size: .875rem;
            font-weight: 600;
            margin-bottom: .4rem;
            color: var(--text);
        }

        .form-control {
            width: 100%;
            padding: .65rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: .95rem;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .9rem;
            background: var(--surface);
        }

        th {
            background: var(--bg);
            font-weight: 600;
            color: var(--muted);
            padding: .75rem 1rem;
            text-align: left;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: .75rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:hover td {
            background: #f8fafc;
        }

        .wallet-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .wallet-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        .wallet-card .title {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .wallet-card .balance {
            font-size: 2.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .deposit-form {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        .deposit-form .amount-presels {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .amount-presel {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 2rem;
            background: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .amount-presel:hover,
        .amount-presel.active {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--bg);
        }

        .history-card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        .tx-type-DEPOSIT {
            color: var(--success);
        }

        .tx-type-WITHDRAW {
            color: var(--danger);
        }

        .tx-type-RENTAL_PAYMENT {
            color: var(--danger);
        }

        .tx-type-BOOKING_PAYMENT {
            color: var(--danger);
        }

        .tx-type-DRIVER_EARNING {
            color: var(--success);
        }

        .tx-type-SYSTEM_FEE {
            color: var(--danger);
        }

        .tx-type-REFUND {
            color: var(--success);
        }

        .btn-momo {
            background: #A50064;
            color: white;
            width: 100%;
            margin-top: 1rem;
            font-weight: 600;
        }

        .btn-momo:hover {
            background: #8b0054;
        }

        @media (max-width: 768px) {
            .wallet-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation Bar from Base Layout -->
    <nav th:replace="~{layout/base :: navbar}"></nav>

    <main class="wallet-container">
        <!-- Messages -->
        <div th:if="${param.success}" class="alert alert-success">
            Nạp tiền thành công!
        </div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}">
        </div>
        <div th:if="${param.error}" class="alert alert-danger">
            Giao dịch bị từ chối hoặc có lỗi xảy ra.
        </div>

        <div class="wallet-grid">
            <!-- Balance Card -->
            <div class="wallet-card">
                <div class="title">Số Dư Hiện Tại</div>
                <div class="balance">
                    <span th:text="${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 0, 'POINT')}">0</span>
                    <span>₫</span>
                </div>
                <div style="margin-top: 2rem; opacity: 0.8; font-size: 0.9rem;">
                    Ví Điện Tử Hệ Thống Đặt Xe
                </div>
            </div>

            <!-- Deposit Form -->
            <div class="deposit-form">
                <h3 style="margin-top:0; margin-bottom:1.5rem;">Nạp Tiền Vào Ví</h3>
                <form th:action="@{/wallet/deposit/momo}" method="post" id="depositForm">
                    <div class="amount-presels">
                        <button type="button" class="amount-presel" onclick="setAmount(50000)">50,000₫</button>
                        <button type="button" class="amount-presel" onclick="setAmount(100000)">100,000₫</button>
                        <button type="button" class="amount-presel" onclick="setAmount(200000)">200,000₫</button>
                        <button type="button" class="amount-presel" onclick="setAmount(500000)">500,000₫</button>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="amount">Hoặc nhập số tiền (Tối thiểu 10,000₫)</label>
                        <input type="number" id="amount" name="amount" class="form-control" min="10000" step="1000"
                            required placeholder="Nhập số tiền...">
                    </div>

                    <button type="submit" class="btn btn-momo">
                        Nạp tiền bằng ví MoMo
                    </button>
                </form>
            </div>
        </div>

        <!-- Transaction History -->
        <div class="history-card">
            <h3 style="margin-top:0; margin-bottom: 1.5rem;">Lịch Sử Giao Dịch</h3>

            <div th:if="${transactions.empty}" style="text-align: center; color: var(--muted); padding: 2rem;">
                Chưa có giao dịch nào.
            </div>

            <table class="table" th:unless="${transactions.empty}">
                <thead>
                    <tr>
                        <th>Thời gian</th>
                        <th>Loại Giao Dịch</th>
                        <th style="text-align: right;">Số tiền</th>
                        <th>Trạng Thái/Mô tả</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${#temporals.format(tx.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <strong th:class="'tx-type-' + ${tx.type.name()}" th:text="${tx.type.name()}"></strong>
                        </td>
                        <td style="text-align: right;">
                            <span th:if="${tx.balanceAfter > tx.balanceBefore}" style="color:var(--success);">+</span>
                            <span th:if="${tx.balanceAfter < tx.balanceBefore}" style="color:var(--danger);">-</span>
                            <span th:text="${#numbers.formatDecimal(tx.amount, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                        </td>
                        <td th:text="${tx.description}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        function setAmount(amount) {
            document.getElementById('amount').value = amount;
        }
    </script>
</body>

</html>
