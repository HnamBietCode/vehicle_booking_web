<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sửa tài khoản – Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --danger: #EF4444;
            --border: #E2E8F0;
            --bg: #F8FAFC;
            --surface: #fff;
            --muted: #64748B;
            --text: #1E293B;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
            text-decoration: none;
        }

        .navbar-brand::before {
            content: '🚗 ';
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: .25rem;
            margin-left: auto;
            list-style: none;
        }

        .nav-link {
            padding: .5rem .85rem;
            border-radius: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: .9rem;
            font-weight: 500;
            transition: all .2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary);
            color: #fff;
        }

        .main {
            max-width: 640px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span::before {
            content: ' / ';
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
        }

        .form-group {
            margin-bottom: 1.15rem;
        }

        .form-label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            margin-bottom: .45rem;
        }

        .form-control {
            width: 100%;
            padding: .7rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: .95rem;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .15);
        }

        select.form-control {
            cursor: pointer;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .6rem 1.3rem;
            border: none;
            border-radius: 8px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: .75rem;
            margin-top: 1.5rem;
        }

        .alert-danger {
            background: #FEF2F2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
            padding: .75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: .9rem;
        }

        .section-title {
            font-size: .9rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin: 1.5rem 0 .75rem;
            padding-bottom: .5rem;
            border-bottom: 1px solid var(--border);
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        input[type=checkbox] {
            width: 1.1rem;
            height: 1.1rem;
            accent-color: var(--primary);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a class="navbar-brand" href="/">VehicleBook</a>
        <ul class="navbar-nav">
            <li><a class="nav-link active" th:href="@{/admin/users}">👥 Quản lý Users</a></li>
            <li><a class="nav-link" th:href="@{/auth/logout}" style="color:#EF4444;">Đăng xuất</a></li>
        </ul>
    </nav>

    <main class="main">
        <div class="breadcrumb">
            <a th:href="@{/admin/users}">Quản lý Users</a>
            <span th:text="${'#' + target.id}">Detail</span>
            <span>Sửa</span>
        </div>
        <h1 class="page-title">✏️ Sửa tài khoản</h1>
        <p style="color:var(--muted);font-size:.9rem;margin-bottom:1.5rem;" th:text="${target.email}">email</p>

        <div th:if="${error}" class="alert-danger" th:text="${error}"></div>

        <div class="card">
            <form th:action="@{/admin/users/{id}/edit(id=${target.id})}" method="post" th:object="${form}">

                <div class="section-title">Thông tin cá nhân</div>

                <div class="form-group">
                    <label class="form-label" for="fullName">👤 Họ và tên</label>
                    <input type="text" id="fullName" class="form-control" name="fullName" th:value="*{fullName}"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">📱 Số điện thoại</label>
                    <input type="tel" id="phone" class="form-control" name="phone" th:value="*{phone}" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="address">📍 Địa chỉ (Customer)</label>
                    <input type="text" id="address" class="form-control" name="address" th:value="*{address}"
                        placeholder="Chỉ áp dụng cho Khách hàng">
                </div>

                <div class="form-group">
                    <label class="form-label" for="avatarUrl">🖼️ URL Ảnh đại diện</label>
                    <input type="url" id="avatarUrl" class="form-control" name="avatarUrl" th:value="*{avatarUrl}">
                </div>

                <div class="section-title">Phân quyền & Trạng thái</div>

                <div class="form-group">
                    <label class="form-label" for="role">Vai trò</label>
                    <select id="role" class="form-control" name="role">
                        <option value="ADMIN" th:selected="${target.role.name() == 'ADMIN'}">🛡️ Admin</option>
                        <option value="CUSTOMER" th:selected="${target.role.name() == 'CUSTOMER'}">🧑‍💼 Khách hàng
                        </option>
                        <option value="DRIVER" th:selected="${target.role.name() == 'DRIVER'}">🚕 Tài xế</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Trạng thái tài khoản</label>
                    <div class="toggle-group">
                        <input type="checkbox" id="isActive" name="isActive" th:checked="${target.isActive}"
                            value="true">
                        <label for="isActive" style="font-size:.9rem;cursor:pointer;">
                            Tài khoản đang <strong th:text="${target.isActive ? 'hoạt động' : 'bị khoá'}">hoạt
                                động</strong>
                        </label>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">💾 Lưu thay đổi</button>
                    <a class="btn btn-outline" th:href="@{/admin/users/{id}(id=${target.id})}">← Huỷ</a>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
