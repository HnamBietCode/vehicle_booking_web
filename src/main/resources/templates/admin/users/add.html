<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thêm tài khoản – Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --danger: #EF4444;
            --border: #E2E8F0;
            --bg: #F8FAFC;
            --surface: #fff;
            --muted: #64748B;
            --text: #1E293B;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
            text-decoration: none;
        }

        .navbar-brand::before {
            content: '🚗 ';
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: .25rem;
            margin-left: auto;
            list-style: none;
        }

        .nav-link {
            padding: .5rem .85rem;
            border-radius: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: .9rem;
            font-weight: 500;
            transition: all .2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary);
            color: #fff;
        }

        .main {
            max-width: 640px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span::before {
            content: ' / ';
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
        }

        .form-group {
            margin-bottom: 1.15rem;
        }

        .form-label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            margin-bottom: .45rem;
        }

        .form-control {
            width: 100%;
            padding: .7rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: .95rem;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .15);
        }

        select.form-control {
            cursor: pointer;
        }

        .form-hint {
            font-size: .78rem;
            color: var(--muted);
            margin-top: .3rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .6rem 1.3rem;
            border: none;
            border-radius: 8px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: .75rem;
            margin-top: 1.5rem;
        }

        .alert-danger {
            background: #FEF2F2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
            padding: .75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: .9rem;
        }

        .section-title {
            font-size: .9rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin: 1.5rem 0 .75rem;
            padding-bottom: .5rem;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <nav th:replace="~{layout/base :: navbar}"></nav>

    <main class="main">
        <div class="breadcrumb">
            <a th:href="@{/admin/users}">Quản lý Users</a>
            <span>Thêm tài khoản</span>
        </div>
        <h1 class="page-title">➕ Thêm tài khoản mới</h1>

        <div th:if="${error}" class="alert-danger" th:text="${error}"></div>

        <div class="card">
            <form th:action="@{/admin/users/add}" method="post" th:object="${form}">

                <div class="section-title">Thông tin tài khoản</div>

                <div class="form-group">
                    <label class="form-label" for="role">Vai trò</label>
                    <select id="role" class="form-control" name="role" required>
                        <option value="">-- Chọn vai trò --</option>
                        <option value="ADMIN">🛡️ Admin</option>
                        <option value="CUSTOMER">🧑‍💼 Khách hàng</option>
                        <option value="DRIVER">🚕 Tài xế</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">📧 Email</label>
                    <input type="email" id="email" class="form-control" name="email" th:value="*{email}"
                        placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">📱 Số điện thoại</label>
                    <input type="tel" id="phone" class="form-control" name="phone" th:value="*{phone}"
                        placeholder="0901234567" required>
                </div>

                <div class="section-title">Thông tin cá nhân</div>

                <div class="form-group">
                    <label class="form-label" for="fullName">👤 Họ và tên</label>
                    <input type="text" id="fullName" class="form-control" name="fullName" th:value="*{fullName}"
                        placeholder="Nguyễn Văn A" required>
                </div>

                <div id="driverFields" style="display: none;">
                    <div class="section-title">Hồ sơ Tài xế</div>
                    <div class="form-group">
                        <label class="form-label" for="cccd">🪪 Căn cước công dân</label>
                        <input type="text" id="cccd" class="form-control" name="cccd" th:value="*{cccd}"
                            placeholder="Nhập 12 số CCCD" pattern="[0-9]{12}" maxlength="12">
                        <p class="form-hint">Bắt buộc nhập 12 số đối với tài khoản Driver.</p>
                    </div>

                    <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;">
                        <span>🪪 Danh sách Bằng lái</span>
                        <button type="button" class="btn btn-primary btn-sm" onclick="addLicense()">+ Thêm bằng lái</button>
                    </div>
                    <div id="licensesContainer"></div>
                </div>

                <div class="section-title">Bảo mật</div>

                <div class="form-group">
                    <label class="form-label" for="password">🔒 Mật khẩu</label>
                    <input type="password" id="password" class="form-control" name="password"
                        placeholder="Tối thiểu 6 ký tự" required>
                    <p class="form-hint">Mật khẩu sẽ được mã hóa BCrypt.</p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">🔒 Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" class="form-control" name="confirmPassword"
                        placeholder="Nhập lại mật khẩu" required>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">💾 Tạo tài khoản</button>
                    <a class="btn btn-outline" th:href="@{/admin/users}">← Huỷ</a>
                </div>
            </form>
        </div>
    </main>

    <style>
        .vehicle-types-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.4rem; }
        .vt-checkbox { display:flex; align-items:center; gap:.4rem; padding:.4rem .6rem;
            border:1.5px solid var(--border); border-radius:8px; font-size:.82rem; cursor:pointer; transition:all .2s; }
        .vt-checkbox:hover { border-color:var(--primary); background:#F5F3FF; }
        .vt-checkbox:has(input:checked) { border-color:var(--primary); background:#EEF2FF; }
        .license-row { border:1.5px solid var(--border); }
        .btn-danger { background:var(--danger); color:#fff; }
        .btn-sm { padding:.35rem .8rem; font-size:.8rem; }
        input[type=checkbox] { width:1.1rem; height:1.1rem; accent-color:var(--primary); cursor:pointer; }
    </style>

    <script>
        const CLASS_MAP = {
            'A1': ['MOTORCYCLE'],
            'B1': ['CAR_4','CAR_7'],
            'B2': ['CAR_4','CAR_7'],
            'C':  ['CAR_16','CAR_29','CAR_45'],
            'D':  ['CAR_16','CAR_29','CAR_45'],
            'E':  ['CAR_29','CAR_45'],
            'FC': ['TRUCK_SMALL','TRUCK_MEDIUM','TRUCK_LARGE']
        };
        let licenseCount = 0;

        function addLicense() {
            licenseCount++;
            const html = `
            <div class="license-row card" style="margin-bottom:1rem;padding:1rem;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;">
                    <strong>Bằng lái #${licenseCount}</strong>
                    <button type="button" class="btn btn-danger btn-sm" onclick="this.closest('.license-row').remove()">✕ Xoá</button>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem;">
                    <div class="form-group" style="margin:0;"><label class="form-label">Số bằng lái</label>
                        <input type="text" class="form-control" name="licenseNumbers" required></div>
                    <div class="form-group" style="margin:0;"><label class="form-label">Hạng bằng</label>
                        <select class="form-control license-class-select" name="licenseClasses" onchange="onClassChange(this)">
                            <option value="A1">A1 – Xe máy</option>
                            <option value="B1">B1 – Xe ô tô (AT)</option>
                            <option value="B2" selected>B2 – Xe ô tô</option>
                            <option value="C">C – Xe tải/khách</option>
                            <option value="D">D – Xe khách lớn</option>
                            <option value="E">E – Xe đầu kéo</option>
                            <option value="FC">FC – Xe tải nặng</option>
                        </select></div>
                    <div class="form-group" style="margin:0;"><label class="form-label">Hạn bằng lái</label>
                        <input type="date" class="form-control" name="licenseExpiries" required></div>
                </div>
                <div class="form-group" style="margin-top:.7rem;margin-bottom:0;">
                    <label class="form-label">Loại xe</label>
                    <div class="vehicle-types-grid vt-grid-row">
                        <label class="vt-checkbox"><input type="checkbox" value="MOTORCYCLE" class="vt-cb"> Xe máy</label>
                        <label class="vt-checkbox"><input type="checkbox" value="CAR_4" class="vt-cb" checked> Xe 4 chỗ</label>
                        <label class="vt-checkbox"><input type="checkbox" value="CAR_7" class="vt-cb" checked> Xe 7 chỗ</label>
                        <label class="vt-checkbox"><input type="checkbox" value="CAR_16" class="vt-cb"> Xe 16 chỗ</label>
                        <label class="vt-checkbox"><input type="checkbox" value="CAR_29" class="vt-cb"> Xe 29 chỗ</label>
                        <label class="vt-checkbox"><input type="checkbox" value="CAR_45" class="vt-cb"> Xe 45 chỗ</label>
                        <label class="vt-checkbox"><input type="checkbox" value="TRUCK_SMALL" class="vt-cb"> Xe tải nhỏ</label>
                        <label class="vt-checkbox"><input type="checkbox" value="TRUCK_MEDIUM" class="vt-cb"> Xe tải trung</label>
                        <label class="vt-checkbox"><input type="checkbox" value="TRUCK_LARGE" class="vt-cb"> Xe tải lớn</label>
                    </div>
                    <input type="hidden" name="licenseVehicleTypes" class="vt-hidden">
                </div>
            </div>`;
            document.getElementById('licensesContainer').insertAdjacentHTML('beforeend', html);
            const newRow = document.getElementById('licensesContainer').lastElementChild;
            onClassChange(newRow.querySelector('.license-class-select'));
        }

        function onClassChange(selectEl) {
            const cls = selectEl.value;
            const row = selectEl.closest('.license-row');
            const cbs = row.querySelectorAll('.vt-cb');
            const allowed = CLASS_MAP[cls] || [];
            cbs.forEach(cb => { cb.checked = allowed.includes(cb.value); });
        }

        document.addEventListener('DOMContentLoaded', function () {
            const roleSelect = document.getElementById('role');
            const driverFields = document.getElementById('driverFields');
            const cccdInput = document.getElementById('cccd');

            function toggleDriver() {
                if (roleSelect.value === 'DRIVER') {
                    driverFields.style.display = 'block';
                    cccdInput.setAttribute('required', 'required');
                } else {
                    driverFields.style.display = 'none';
                    cccdInput.removeAttribute('required');
                    cccdInput.value = '';
                }
            }

            // On submit: collect checkboxes into hidden fields
            document.querySelector('form').addEventListener('submit', function () {
                document.querySelectorAll('.license-row').forEach(row => {
                    const sel = [];
                    row.querySelectorAll('.vt-cb').forEach(cb => { if (cb.checked) sel.push(cb.value); });
                    row.querySelector('.vt-hidden').value = sel.join(',');
                });
            });

            roleSelect.addEventListener('change', toggleDriver);
            toggleDriver();
        });
    </script>
</body>
</html>
