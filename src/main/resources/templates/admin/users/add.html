<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thêm tài khoản – Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --danger: #EF4444;
            --border: #E2E8F0;
            --bg: #F8FAFC;
            --surface: #fff;
            --muted: #64748B;
            --text: #1E293B;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
            text-decoration: none;
        }

        .navbar-brand::before {
            content: '🚗 ';
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: .25rem;
            margin-left: auto;
            list-style: none;
        }

        .nav-link {
            padding: .5rem .85rem;
            border-radius: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: .9rem;
            font-weight: 500;
            transition: all .2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary);
            color: #fff;
        }

        .main {
            max-width: 640px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span::before {
            content: ' / ';
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
        }

        .form-group {
            margin-bottom: 1.15rem;
        }

        .form-label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            margin-bottom: .45rem;
        }

        .form-control {
            width: 100%;
            padding: .7rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: .95rem;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .15);
        }

        select.form-control {
            cursor: pointer;
        }

        .form-hint {
            font-size: .78rem;
            color: var(--muted);
            margin-top: .3rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .6rem 1.3rem;
            border: none;
            border-radius: 8px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: .75rem;
            margin-top: 1.5rem;
        }

        .alert-danger {
            background: #FEF2F2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
            padding: .75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: .9rem;
        }

        .section-title {
            font-size: .9rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin: 1.5rem 0 .75rem;
            padding-bottom: .5rem;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a class="navbar-brand" href="/">VehicleBook</a>
        <ul class="navbar-nav">
            <li><a class="nav-link" th:href="@{/vehicles/search}">🔍 Tìm xe</a></li>
            <li><a class="nav-link active" th:href="@{/admin/users}">👥 Quản lý Users</a></li>
            <li><a class="nav-link" th:href="@{/admin/vehicles}">🚗 Quản lý Xe</a></li>
            <li><a class="nav-link" th:href="@{/auth/logout}" style="color:#EF4444;">Đăng xuất</a></li>
        </ul>
    </nav>

    <main class="main">
        <div class="breadcrumb">
            <a th:href="@{/admin/users}">Quản lý Users</a>
            <span>Thêm tài khoản</span>
        </div>
        <h1 class="page-title">➕ Thêm tài khoản mới</h1>

        <div th:if="${error}" class="alert-danger" th:text="${error}"></div>

        <div class="card">
            <form th:action="@{/admin/users/add}" method="post" th:object="${form}">

                <div class="section-title">Thông tin tài khoản</div>

                <div class="form-group">
                    <label class="form-label" for="role">Vai trò</label>
                    <select id="role" class="form-control" name="role" required>
                        <option value="">-- Chọn vai trò --</option>
                        <option value="ADMIN">🛡️ Admin</option>
                        <option value="CUSTOMER">🧑‍💼 Khách hàng</option>
                        <option value="DRIVER">🚕 Tài xế</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">📧 Email</label>
                    <input type="email" id="email" class="form-control" name="email" th:value="*{email}"
                        placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">📱 Số điện thoại</label>
                    <input type="tel" id="phone" class="form-control" name="phone" th:value="*{phone}"
                        placeholder="0901234567" required>
                </div>

                <div class="section-title">Thông tin cá nhân</div>

                <div class="form-group">
                    <label class="form-label" for="fullName">👤 Họ và tên</label>
                    <input type="text" id="fullName" class="form-control" name="fullName" th:value="*{fullName}"
                        placeholder="Nguyễn Văn A" required>
                </div>

                <div class="form-group" id="driverFields" style="display: none;">
                    <label class="form-label" for="cccd">🪪 Hồ sơ Tài xế</label>
                    <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                        <div>
                            <input type="text" id="cccd" class="form-control" name="cccd" th:value="*{cccd}"
                                placeholder="Nhập 12 số CCCD">
                            <p class="form-hint">Bắt buộc nhập 12 số đối với tài khoản Driver.</p>
                        </div>
                        <div>
                            <input type="text" id="driverLicense" class="form-control" name="driverLicense"
                                th:value="*{driverLicense}" placeholder="Nhập số bằng lái xe">
                        </div>
                        <div>
                            <label class="form-label" for="licenseExpiry" style="margin-bottom: 0.2rem;">Ngày hết hạn
                                bằng lái</label>
                            <input type="date" id="licenseExpiry" class="form-control" name="licenseExpiry"
                                th:value="*{licenseExpiry}">
                        </div>
                        <div>
                            <label class="form-label" for="vehicleTypes" style="margin-bottom: 0.2rem;">Loại xe</label>
                            <select id="vehicleTypes" class="form-control" name="vehicleTypes">
                                <option value="">-- Chọn loại xe --</option>
                                <option value="A1" th:selected="*{vehicleTypes == 'A1'}">A1</option>
                                <option value="A2" th:selected="*{vehicleTypes == 'A2'}">A2</option>
                                <option value="A3" th:selected="*{vehicleTypes == 'A3'}">A3</option>
                                <option value="A4" th:selected="*{vehicleTypes == 'A4'}">A4</option>
                                <option value="B1" th:selected="*{vehicleTypes == 'B1'}">B1</option>
                                <option value="B2" th:selected="*{vehicleTypes == 'B2'}">B2</option>
                                <option value="C" th:selected="*{vehicleTypes == 'C'}">C</option>
                                <option value="D" th:selected="*{vehicleTypes == 'D'}">D</option>
                                <option value="E" th:selected="*{vehicleTypes == 'E'}">E</option>
                                <option value="FB2" th:selected="*{vehicleTypes == 'FB2'}">FB2</option>
                                <option value="FD" th:selected="*{vehicleTypes == 'FD'}">FD</option>
                                <option value="FC" th:selected="*{vehicleTypes == 'FC'}">FC</option>
                                <option value="FE" th:selected="*{vehicleTypes == 'FE'}">FE</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="section-title">Bảo mật</div>

                <div class="form-group">
                    <label class="form-label" for="password">🔒 Mật khẩu</label>
                    <input type="password" id="password" class="form-control" name="password"
                        placeholder="Tối thiểu 6 ký tự" required>
                    <p class="form-hint">Mật khẩu sẽ được mã hóa BCrypt.</p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">🔒 Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" class="form-control" name="confirmPassword"
                        placeholder="Nhập lại mật khẩu" required>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">💾 Tạo tài khoản</button>
                    <a class="btn btn-outline" th:href="@{/admin/users}">← Huỷ</a>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const roleSelect = document.getElementById('role');
            const cccdGroup = document.getElementById('driverFields');
            const cccdInput = document.getElementById('cccd');
            const driverLicenseInput = document.getElementById('driverLicense');
            const licenseExpiryInput = document.getElementById('licenseExpiry');
            const vehicleTypesInput = document.getElementById('vehicleTypes');

            function toggleCccd() {
                if (roleSelect.value === 'DRIVER') {
                    cccdGroup.style.display = 'block';
                    cccdInput.setAttribute('required', 'required');
                    driverLicenseInput.setAttribute('required', 'required');
                    licenseExpiryInput.setAttribute('required', 'required');
                    vehicleTypesInput.setAttribute('required', 'required');
                } else {
                    cccdGroup.style.display = 'none';
                    cccdInput.removeAttribute('required');
                    driverLicenseInput.removeAttribute('required');
                    licenseExpiryInput.removeAttribute('required');
                    vehicleTypesInput.removeAttribute('required');

                    cccdInput.value = '';
                    driverLicenseInput.value = '';
                    licenseExpiryInput.value = '';
                    vehicleTypesInput.value = '';
                }
            }

            roleSelect.addEventListener('change', toggleCccd);

            // Chạy hàm toggleCccd ngay khi tải trang để xử lý trường hợp user chọn form lỗi và được load lại
            toggleCccd();
        });
    </script>
</body>

</html>
