<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Users – Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --danger: #EF4444;
            --success: #10B981;
            --bg: #F8FAFC;
            --surface: #fff;
            --border: #E2E8F0;
            --text: #1E293B;
            --muted: #64748B;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
            text-decoration: none;
        }

        .navbar-brand::before {
            content: '🚗 ';
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: .25rem;
            margin-left: auto;
            list-style: none;
        }

        .nav-link {
            padding: .5rem .85rem;
            border-radius: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: .9rem;
            font-weight: 500;
            transition: all .2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary);
            color: #fff;
        }

        .main {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .alert {
            padding: .85rem 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            font-size: .9rem;
            font-weight: 500;
        }

        .alert-danger {
            background: #FEF2F2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
        }

        .alert-success {
            background: #F0FDF4;
            color: #166534;
            border-left: 4px solid var(--success);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .55rem 1.1rem;
            border: none;
            border-radius: 8px;
            font-size: .875rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-sm {
            padding: .3rem .65rem;
            font-size: .78rem;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Summary stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
        }

        .stat-count {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: .8rem;
            color: var(--muted);
            font-weight: 500;
            margin-top: .25rem;
        }

        /* Table */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .875rem;
        }

        th {
            background: var(--bg);
            font-weight: 600;
            color: var(--muted);
            padding: .75rem 1rem;
            text-align: left;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: .75rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f8faff;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: .2rem .6rem;
            border-radius: 999px;
            font-size: .72rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge-admin {
            background: #EDE9FE;
            color: #5B21B6;
        }

        .badge-customer {
            background: #DBEAFE;
            color: #1D4ED8;
        }

        .badge-driver {
            background: #D1FAE5;
            color: #065F46;
        }

        .badge-active {
            background: #D1FAE5;
            color: #065F46;
        }

        .badge-inactive {
            background: #FEE2E2;
            color: #991B1B;
        }

        .badge-pending {
            background: #FEF08A;
            color: #854D0E;
        }

        .badge-rejected {
            background: #FEE2E2;
            color: #991B1B;
        }

        /* Action buttons */
        .action-group {
            display: flex;
            gap: .4rem;
            flex-wrap: nowrap;
        }

        /* Search */
        .table-toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .search-box {
            flex: 1;
            padding: .55rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: .875rem;
            font-family: inherit;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
        }
    </style>
</head>

<body>
    <nav th:replace="~{layout/base :: navbar}"></nav>

    <main class="main">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="page-header">
            <h1 class="page-title">👥 Quản lý tài khoản</h1>
            <a class="btn btn-primary" th:href="@{/admin/users/add}">➕ Thêm tài khoản</a>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-count" th:text="${users.size()}">0</div>
                <div class="stat-label">Tổng users</div>
            </div>
            <div class="stat-card">
                <div class="stat-count" th:text="${#lists.size(users.?[role.name() == 'ADMIN'])}">0</div>
                <div class="stat-label">Admin</div>
            </div>
            <div class="stat-card">
                <div class="stat-count" th:text="${#lists.size(users.?[role.name() == 'CUSTOMER'])}">0</div>
                <div class="stat-label">Khách hàng</div>
            </div>
            <div class="stat-card">
                <div class="stat-count" th:text="${#lists.size(users.?[role.name() == 'DRIVER'])}">0</div>
                <div class="stat-label">Tài xế</div>
            </div>
            <div class="stat-card">
                <div class="stat-count" th:text="${#lists.size(users.?[isActive])}">0</div>
                <div class="stat-label">Đang hoạt động</div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-card">
            <div class="table-toolbar">
                <input type="text" class="search-box" placeholder="🔍 Tìm kiếm email, tên…"
                    oninput="filterTable(this.value)" id="searchInput">
            </div>
            <div class="table-wrap">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Email</th>
                            <th>SĐT</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u, iter : ${users}">
                            <td th:text="${iter.count}">1</td>
                            <td th:text="${u.email}">—</td>
                            <td th:text="${u.phone}">—</td>
                            <td>
                                <span class="badge"
                                    th:classappend="${u.role.name() == 'ADMIN' ? 'badge-admin' : (u.role.name() == 'CUSTOMER' ? 'badge-customer' : 'badge-driver')}"
                                    th:text="${u.role}">—</span>
                            </td>
                            <td>
                                <!-- Cho Customer/Admin thì hiển thị trạng thái hoạt động -->
                                <span th:if="${u.role.name() != 'DRIVER'}" class="badge"
                                    th:classappend="${u.isActive ? 'badge-active' : 'badge-inactive'}"
                                    th:text="${u.isActive ? 'Hoạt động' : 'Khoá'}">—</span>

                                <!-- Cho Driver: Nếu đang active -> Hoạt động (Đã duyệt) -->
                                <span th:if="${u.role.name() == 'DRIVER' && u.isActive}" class="badge badge-active">Hoạt
                                    động (Đã duyệt)</span>

                                <!-- Cho Driver: Nếu không active: Kiểm tra status -->
                                <span
                                    th:if="${u.role.name() == 'DRIVER' && !u.isActive && driverStatuses != null && driverStatuses.get(u.id) == 'PENDING'}"
                                    class="badge badge-pending">Chờ duyệt</span>
                                <span
                                    th:if="${u.role.name() == 'DRIVER' && !u.isActive && (driverStatuses == null || driverStatuses.get(u.id) != 'PENDING')}"
                                    class="badge badge-inactive">Khoá</span>
                            </td>
                            <td th:text="${#temporals.format(u.createdAt,'dd/MM/yyyy')}">—</td>
                            <td>
                                <div class="action-group">
                                    <a class="btn btn-outline btn-sm" th:href="@{/admin/users/{id}(id=${u.id})}">👁</a>
                                    <a class="btn btn-outline btn-sm"
                                        th:href="@{/admin/users/{id}/edit(id=${u.id})}">✏️</a>
                                    <!-- Khoá / Mở khoá -->
                                    <span th:if="${u.isActive}">
                                        <button type="button" class="btn btn-outline btn-sm lock-btn"
                                            title="Khoá tài khoản"
                                            th:data-id="${u.id}"
                                            th:data-email="${u.email}">
                                            🔒
                                        </button>
                                    </span>
                                    <span th:unless="${u.isActive}">
                                        <form th:action="@{/admin/users/{id}/toggle-active(id=${u.id})}" method="post"
                                            style="display:inline;">
                                            <button type="submit" class="btn btn-outline btn-sm"
                                                title="Mở khoá tài khoản">
                                                🔓
                                            </button>
                                        </form>
                                    </span>
                                    <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                                        style="display:inline;" th:if="${u.id != loggedUser.id}"
                                        onsubmit="return confirm('Xoá tài khoản này?')">
                                        <button type="submit" class="btn btn-danger btn-sm">🗑</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="7" style="text-align:center;color:var(--muted);padding:2rem;">Chưa có tài khoản
                                nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ══════ Modal Khoá tài khoản ══════ -->
    <div class="modal-overlay" id="lockModal">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-icon">🔒</span>
                <h3 class="modal-title">Khoá tài khoản</h3>
            </div>
            <p class="modal-desc">Bạn đang khoá tài khoản: <strong id="lockEmail"></strong></p>

            <div class="modal-field">
                <label class="modal-label" for="lockReason">Lý do khoá <span style="color:var(--danger)">*</span></label>
                <textarea id="lockReason" class="modal-textarea" rows="3"
                    placeholder="Nhập lý do khoá tài khoản…"></textarea>
                <p class="modal-hint" id="lockReasonHint" style="display:none;color:var(--danger);">Vui lòng nhập lý do khoá.</p>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeLockModal()">❌ Huỷ</button>
                <button type="button" class="btn btn-danger" id="confirmLockBtn" onclick="confirmLock()">🔒 Xác nhận khoá</button>
            </div>
        </div>
    </div>

    <form id="lockForm" method="post" style="display:none;">
        <input type="hidden" name="reason" id="lockReasonInput" />
    </form>

    <style>
        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(15, 23, 42, .45);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
            animation: fadeIn .2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .modal-box {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            animation: slideUp .25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(24px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .modal-header {
            display: flex;
            align-items: center;
            gap: .6rem;
            margin-bottom: .75rem;
        }
        .modal-icon {
            font-size: 1.6rem;
        }
        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
        }
        .modal-desc {
            font-size: .9rem;
            color: var(--muted);
            margin-bottom: 1.25rem;
        }
        .modal-field {
            margin-bottom: 1.25rem;
        }
        .modal-label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            margin-bottom: .4rem;
        }
        .modal-textarea {
            width: 100%;
            padding: .7rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: .9rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color .2s, box-shadow .2s;
        }
        .modal-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .15);
        }
        .modal-hint {
            font-size: .78rem;
            margin-top: .3rem;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: .75rem;
        }
    </style>

    <script>
        let lockUserId = null;

        function openLockModal(userId, email) {
            lockUserId = userId;
            document.getElementById('lockEmail').textContent = email;
            document.getElementById('lockReason').value = '';
            document.getElementById('lockReasonHint').style.display = 'none';
            document.getElementById('lockModal').classList.add('show');
            setTimeout(() => document.getElementById('lockReason').focus(), 200);
        }

        // Gắn sự kiện click cho tất cả nút lock
        document.querySelectorAll('.lock-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                openLockModal(btn.dataset.id, btn.dataset.email);
            });
        });

        function closeLockModal() {
            document.getElementById('lockModal').classList.remove('show');
            lockUserId = null;
        }

        function confirmLock() {
            const reason = document.getElementById('lockReason').value.trim();
            if (!reason) {
                document.getElementById('lockReasonHint').style.display = 'block';
                document.getElementById('lockReason').focus();
                return;
            }
            // Submit form
            const form = document.getElementById('lockForm');
            form.action = '/admin/users/' + lockUserId + '/toggle-active';
            document.getElementById('lockReasonInput').value = reason;
            form.submit();
        }

        // Đóng modal khi nhấn Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLockModal();
        });

        // Đóng modal khi click ra ngoài
        document.getElementById('lockModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeLockModal();
        });

        function filterTable(query) {
            const q = query.toLowerCase();
            document.querySelectorAll('#usersTable tbody tr').forEach(tr => {
                tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }
    </script>
</body>

</html>
