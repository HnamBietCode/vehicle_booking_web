<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cấu hình giá thuê tài xế – SR-Booking Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: #f5f3f9; color: #1b1b20; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 12px; color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600; transition: all .2s; }
        .sidebar-link:hover { background: rgba(255,255,255,.1); color: white; }
        .sidebar-link.active { background: #FE6A34; color: white; transform: scale(1.02); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .card { background: white; border: 1px solid #f0eef5; border-radius: 16px; padding: 20px 24px; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,16,62,.04); }
        .form-group { margin-bottom: .5rem; }
        .form-label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: .35rem; color: #64748b; }
        .form-control { width: 100%; padding: .6rem .9rem; border: 1.5px solid #e9e7ed; border-radius: 10px; font-size: .9rem; font-family: inherit; outline: none; transition: border-color .2s; }
        .form-control:focus { border-color: #0A2463; box-shadow: 0 0 0 3px rgba(10,36,99,.1); }
        .btn { display: inline-flex; align-items: center; gap: .35rem; padding: .5rem 1.2rem; border: none; border-radius: 10px; font-size: .85rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all .2s; font-family: inherit; }
        .btn-primary { background: #0A2463; color: #fff; }
        .btn-primary:hover { background: #0d2d78; }
        .btn-outline { background: transparent; border: 1.5px solid #e9e7ed; color: #64748b; }
        .btn-outline:hover { border-color: #0A2463; color: #0A2463; }
        .alert-success { background: #F0FDF4; color: #166534; border-left: 3px solid #10B981; padding: .8rem 1.1rem; border-radius: 10px; margin-bottom: 1rem; font-size: .875rem; }
        .rate-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 1rem; align-items: flex-end; }
        @media (max-width: 600px) { .rate-form { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<!-- Sidebar -->
<aside style="position:fixed;left:0;top:0;height:100%;width:256px;background:#0A2463;display:flex;flex-direction:column;padding:24px 0;z-index:50;box-shadow:4px 0 24px rgba(0,16,62,.15);">
    <div style="padding:0 24px;margin-bottom:32px;">
        <h1 style="color:white;font-size:1.4rem;font-weight:800;font-style:italic;letter-spacing:-.02em;">SR-Booking</h1>
        <p style="color:#93c5fd;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;opacity:.7;">Mobility Admin</p>
    </div>
    <nav style="flex:1;padding:0 8px;display:flex;flex-direction:column;gap:2px;">
        <a class="sidebar-link" href="/admin/dashboard"><span class="material-symbols-outlined" style="font-size:20px;">dashboard</span>Dashboard</a>
        <a class="sidebar-link" href="/admin/users"><span class="material-symbols-outlined" style="font-size:20px;">group</span>Quản lý Users</a>
        <a class="sidebar-link" href="/admin/vehicles"><span class="material-symbols-outlined" style="font-size:20px;">directions_car</span>Quản lý Xe</a>
        <a class="sidebar-link active" href="/admin/sober-bookings"><span class="material-symbols-outlined" style="font-size:20px;">assignment</span>Quản lý Lái hộ</a>
        <a class="sidebar-link" href="/admin/withdrawals"><span class="material-symbols-outlined" style="font-size:20px;">payments</span>Rút tiền</a>
        <a class="sidebar-link" href="/admin/pickup-points"><span class="material-symbols-outlined" style="font-size:20px;">location_on</span>Điểm đón</a>
            <a class="sidebar-link" href="/admin/ratings"><span class="material-symbols-outlined" style="font-size:20px;">star</span>Đánh giá</a>
        <a class="sidebar-link" href="/admin/realtime"><span class="material-symbols-outlined" style="font-size:20px;">monitoring</span>Realtime<span style="margin-left:auto;width:8px;height:8px;background:#4ade80;border-radius:50%;animation:pulse 1.5s infinite;"></span></a>
    </nav>
    <div style="padding:0 8px;border-top:1px solid rgba(255,255,255,.1);padding-top:12px;margin-top:8px;">
        <a class="sidebar-link" href="/auth/logout" style="color:#fca5a5;"><span class="material-symbols-outlined" style="font-size:18px;">logout</span>Đăng xuất</a>
    </div>
</aside>

<!-- Top Header -->
<header style="position:fixed;top:0;right:0;width:calc(100% - 256px);height:64px;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);display:flex;justify-content:space-between;align-items:center;padding:0 32px;z-index:40;border-bottom:1px solid #f0eef5;">
    <div style="display:flex;align-items:center;gap:8px;">
        <a href="/admin/sober-bookings" style="color:#64748b;font-size:.85rem;text-decoration:none;font-weight:500;">Quản lý Lái hộ</a>
        <span style="color:#c5c6d2;">/</span>
        <span style="color:#0A2463;font-weight:700;font-size:.85rem;">Cấu hình giá</span>
    </div>
    <div style="width:34px;height:34px;border-radius:50%;background:#0A2463;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px;">AD</div>
</header>

<!-- Main -->
<main style="margin-left:256px;padding:88px 32px 48px;max-width:900px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <h1 style="font-size:1.5rem;font-weight:800;color:#0A2463;">⚙️ Cấu hình giá thuê tài xế</h1>
        <a class="btn btn-outline" th:href="@{/admin/sober-bookings}">← Quay lại</a>
    </div>

    <div th:if="${success}" class="alert-success" th:text="${success}"></div>

    <div class="card" th:each="r : ${rates}">
        <h4 th:text="${r.vehicleCategory}" style="font-weight:700;color:#0A2463;margin-bottom:.8rem;"></h4>
        <form th:action="@{/admin/sober-bookings/rates/update}" method="post" class="rate-form">
            <input type="hidden" name="rateId" th:value="${r.id}">
            <div class="form-group">
                <label class="form-label">Giá theo giờ (VNĐ)</label>
                <input type="number" name="hourlyRate" class="form-control" th:value="${r.hourlyRate}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Giá theo ngày (VNĐ)</label>
                <input type="number" name="dailyRate" class="form-control" th:value="${r.dailyRate}" required>
            </div>
            <button type="submit" class="btn btn-primary">
                <span class="material-symbols-outlined" style="font-size:16px;">save</span>Lưu
            </button>
        </form>
        <div style="margin-top:.5rem;font-size:.78rem;color:#94a3b8;">
            Cập nhật lần cuối: <span th:text="${#temporals.format(r.updatedAt, 'dd/MM/yyyy HH:mm')}"></span>
        </div>
    </div>
</main>
</body>
</html>
