<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cấu hình giá thuê tài xế | Admin</title>
    <style th:replace="~{layout/base :: head}"></style>
    <style>
        .rate-card { margin-bottom: 1.5rem; }
        .rate-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 1rem; align-items: flex-end; }
    </style>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<main class="main">
    <div class="page-header">
        <h1 class="page-title">Cấu hình giá thuê tài xế</h1>
        <a class="btn btn-outline" th:href="@{/admin/sober-bookings}">Quay lại</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card rate-card" th:each="r : ${rates}">
        <h4 th:text="${r.vehicleCategory}"></h4>
        <form th:action="@{/admin/sober-bookings/rates/update}" method="post" class="rate-form">
            <input type="hidden" name="rateId" th:value="${r.id}">
            <div class="form-group">
                <label class="form-label">Giá theo giờ (VNĐ)</label>
                <input type="number" name="hourlyRate" class="form-control" th:value="${r.hourlyRate}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Giá theo ngày (VNĐ)</label>
                <input type="number" name="dailyRate" class="form-control" th:value="${r.dailyRate}" required>
            </div>
            <button type="submit" class="btn btn-primary">Lưu</button>
        </form>
        <div style="margin-top: .5rem; font-size: .8rem; color: var(--muted);">
            Cập nhật lần cuối: <span th:text="${#temporals.format(r.updatedAt, 'dd/MM/yyyy HH:mm')}"></span>
        </div>
    </div>
</main>
</body>
</html>
