<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – VehicleBook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --danger: #EF4444;
            --success: #10B981;
            --border: #E2E8F0;
            --muted: #64748B;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
        }

        .auth-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo span {
            font-size: 2.5rem;
        }

        .auth-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: .25rem;
        }

        .auth-logo p {
            color: var(--muted);
            font-size: .9rem;
            margin-top: .25rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            margin-bottom: .45rem;
        }

        .form-control {
            width: 100%;
            padding: .7rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: .95rem;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .15);
        }

        .btn-primary {
            width: 100%;
            padding: .8rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .15s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .alert-danger {
            background: #FEF2F2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
            padding: .75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: .9rem;
        }

        .alert-success {
            background: #F0FDF4;
            color: #166534;
            border-left: 4px solid var(--success);
            padding: .75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: .9rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .875rem;
            color: var(--muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.5rem 0;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="auth-logo">
            <span>🚗</span>
            <h1>VehicleBook</h1>
            <p>Đăng nhập vào tài khoản của bạn</p>
        </div>

        <div th:if="${error}" class="alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>

        <form th:action="@{/auth/login}" method="post" th:object="${form}">
            <!-- Pass redirect if present -->
            <input type="hidden" name="redirect" th:value="${param.redirect}" />

            <div class="form-group">
                <label class="form-label" for="email">📧 Email</label>
                <input type="email" id="email" class="form-control" name="email" th:value="*{email}"
                    placeholder="example@email.com" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">🔒 Mật khẩu</label>
                <input type="password" id="password" class="form-control" name="password" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn-primary">Đăng nhập →</button>
        </form>

        <hr class="divider">
        <div class="auth-footer">
            Chưa có tài khoản? <a th:href="@{/auth/register}">Đăng ký ngay</a>
        </div>
    </div>
</body>

</html>
