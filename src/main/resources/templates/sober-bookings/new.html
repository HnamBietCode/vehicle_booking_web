<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuê tài xế lái xe hộ</title>
    <style th:replace="~{layout/base :: head}"></style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-grid .full { grid-column: 1 / -1; }
        .address-wrapper { position: relative; }
        #addressSuggestions {
            box-shadow: 0 10px 28px rgba(15, 23, 42, .10);
            position: relative;
            z-index: 10;
        }
        #map-preview {
            display: none;
            margin-top: .75rem;
            height: 260px;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: #eef2f7;
        }
        .estimate-box {
            margin-top: .5rem;
            padding: .9rem 1rem;
            border: 1px dashed var(--border);
            border-radius: 10px;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .estimate-label { color: var(--muted); font-weight: 600; font-size: .9rem; }
        .estimate-value { color: var(--primary); font-weight: 800; font-size: 1.1rem; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<main class="main">
    <div class="page-header">
        <h1 class="page-title">Thuê tài xế lái xe hộ</h1>
        <a class="btn btn-outline" th:href="@{/sober-bookings/my}">Lịch sử đặt</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card">
        <h3 class="card-title">Thông tin yêu cầu</h3>
        <form th:action="@{/sober-bookings/new}" method="post" th:object="${booking}">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Loại xe của bạn</label>
                    <select class="form-control" th:field="*{vehicleCategory}" id="vehicleCategory" required>
                        <option value="">-- Chọn loại xe --</option>
                        <option value="MOTORCYCLE">Xe máy</option>
                        <option value="CAR_4">Xe hơi 4 chỗ</option>
                        <option value="CAR_7">Xe hơi 7 chỗ</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Tên xe / Biển số</label>
                    <input type="text" class="form-control" th:field="*{customerVehicle}" placeholder="VD: Honda City - 51A-123.45" required>
                </div>

                <div class="form-group full">
                    <label class="form-label">Địa điểm đón (Tỉnh/Thành phố)</label>
                    <input type="text" id="pickupAddressInput" class="form-control" placeholder="Nhap dia chi nhu ben admin" required>
                        <option value="">-- Chọn Tỉnh/Thành phố --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Quận/Huyện</label>
                    <select id="district" class="form-control" required disabled>
                        <option value="">-- Chọn Quận/Huyện --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Phường/Xã</label>
                    <select id="ward" class="form-control" required disabled>
                        <option value="">-- Chọn Phường/Xã --</option>
                    </select>
                </div>

                <div class="form-group full address-wrapper">
                    <label class="form-label">Số nhà / Tên đường</label>
                    <input type="text" id="streetAddress" class="form-control" placeholder="Ví dụ: 123 Nguyễn Huệ" required>
                    <div id="addressSuggestions" style="display:none; margin-top:.5rem; border:1px solid #dbe3ef; border-radius:12px; background:#fff; overflow:hidden;"></div>
                    <div id="map-preview"></div>
                    <input type="hidden" th:field="*{pickupAddress}" id="pickupAddress">
                    <input type="hidden" th:field="*{province}" id="provinceName">
                    <input type="hidden" th:field="*{district}" id="districtName">
                    <input type="hidden" th:field="*{ward}" id="wardName">
                    <input type="hidden" th:field="*{pickupLat}" id="pickupLat">
                    <input type="hidden" th:field="*{pickupLng}" id="pickupLng">
                </div>

                <div class="form-group">
                    <label class="form-label">Thời gian bắt đầu</label>
                    <input type="datetime-local" class="form-control" th:field="*{startTime}" required>
                </div>

                <div class="form-group" style="display:flex; gap:1rem; align-items: flex-end;">
                    <div style="flex:1;">
                        <label class="form-label">Thời lượng thuê</label>
                        <input type="number" class="form-control" th:field="*{duration}" min="1" id="duration" required>
                    </div>
                    <div style="flex:1;">
                        <label class="form-label">Đơn vị</label>
                        <select class="form-control" th:field="*{durationUnit}" id="durationUnit" required>
                            <option th:each="unit : ${durationUnits}" th:value="${unit}" th:text="${unit.name() == 'HOURLY' ? 'Giờ' : 'Ngày'}"></option>
                        </select>
                    </div>
                </div>

                <div class="form-group full">
                    <label class="form-label">Ghi chú (nếu có)</label>
                    <textarea class="form-control" th:field="*{notes}" rows="3" placeholder="Yêu cầu thêm cho tài xế..."></textarea>
                </div>

                <div class="form-group full">
                    <div class="estimate-box">
                        <div class="estimate-label">Báo giá tạm tính</div>
                        <div id="estimateValue" class="estimate-value">--</div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; font-size: 1.1rem; padding: .8rem;">Tạo yêu cầu thuê tài xế</button>
            </div>
        </form>
    </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
    (function() {
        // --- Estimation Logic ---
        const cat = document.getElementById('vehicleCategory');
        const count = document.getElementById('duration');
        const unit = document.getElementById('durationUnit');
        const est = document.getElementById('estimateValue');

        const rates = /*[[${ratesJson}]]*/ {};

        function updateEst() {
            const vCat = cat.value;
            const vUnit = unit.value;
            const vCount = parseInt(count.value);

            if (vCat && vUnit && vCount > 0 && rates[vUnit] && rates[vUnit][vCat]) {
                const rate = rates[vUnit][vCat];
                est.textContent = new Intl.NumberFormat('vi-VN').format(rate * vCount) + 'đ';
            } else {
                est.textContent = '--';
            }
        }

        [cat, count, unit].forEach(el => el.addEventListener('change', updateEst));
        count.addEventListener('input', updateEst);

        // --- Address API Logic ---
        const provinceSel = document.getElementById('province');
        const districtSel = document.getElementById('district');
        const wardSel = document.getElementById('ward');
        const hiddenManualInput = document.getElementById('pickupAddressInput');
        const addressInput = document.getElementById('streetAddress');
        const finalAddr = document.getElementById('pickupAddress');
        const pickupLatInput = document.getElementById('pickupLat');
        const pickupLngInput = document.getElementById('pickupLng');
        const suggestionBox = document.getElementById('addressSuggestions');
        const mapPreview = document.getElementById('map-preview');
        let suggestionTimer = null;
        let selectedSuggestedAddress = '';
        let selectedAddressParts = null;
        let map = null;
        let marker = null;

        [provinceSel, districtSel, wardSel, hiddenManualInput].forEach((element) => {
            const wrapper = element?.closest('.form-group');
            if (wrapper) wrapper.style.display = 'none';
            if (element) {
                element.required = false;
                element.disabled = true;
            }
        });

        if (addressInput) {
            addressInput.placeholder = 'Nhap dia chi nhu ben admin';
            const label = addressInput.closest('.form-group')?.querySelector('.form-label');
            if (label) label.textContent = 'Dia diem don';
        }

        async function fetchProvinces() {
            try {
                const res = await fetch('https://provinces.open-api.vn/api/p/');
                const data = await res.json();
                data.forEach(p => {
                    let opt = document.createElement('option');
                    opt.value = p.code;
                    opt.text = p.name;
                    provinceSel.add(opt);
                });
            } catch (e) { console.error("Error fetching provinces", e); }
        }

        provinceSel.addEventListener('change', async () => {
            selectedSuggestedAddress = '';
            districtSel.innerHTML = '<option value="">-- Chọn Quận/Huyện --</option>';
            wardSel.innerHTML = '<option value="">-- Chọn Phường/Xã --</option>';
            districtSel.disabled = true;
            wardSel.disabled = true;

            if (provinceSel.value) {
                try {
                    const res = await fetch(`https://provinces.open-api.vn/api/p/${provinceSel.value}?depth=2`);
                    const data = await res.json();
                    data.districts.forEach(d => {
                        let opt = document.createElement('option');
                        opt.value = d.code;
                        opt.text = d.name;
                        districtSel.add(opt);
                    });
                    districtSel.disabled = false;
                } catch (e) { console.error("Error fetching districts", e); }
            }
            updateFinalAddress();
            fetchAddressSuggestions();
        });

        districtSel.addEventListener('change', async () => {
            selectedSuggestedAddress = '';
            wardSel.innerHTML = '<option value="">-- Chọn Phường/Xã --</option>';
            wardSel.disabled = true;

            if (districtSel.value) {
                try {
                    const res = await fetch(`https://provinces.open-api.vn/api/d/${districtSel.value}?depth=2`);
                    const data = await res.json();
                    data.wards.forEach(w => {
                        let opt = document.createElement('option');
                        opt.value = w.code;
                        opt.text = w.name;
                        wardSel.add(opt);
                    });
                    wardSel.disabled = false;
                } catch (e) { console.error("Error fetching wards", e); }
            }
            updateFinalAddress();
            fetchAddressSuggestions();
        });

        wardSel.addEventListener('change', () => {
            selectedSuggestedAddress = '';
            updateFinalAddress();
            fetchAddressSuggestions();
        });
        addressInput.addEventListener('input', () => {
            selectedSuggestedAddress = '';
            selectedAddressParts = null;
            updateFinalAddress();
            hideMap();
            if (suggestionTimer) window.clearTimeout(suggestionTimer);
            suggestionTimer = window.setTimeout(() => searchAddress(addressInput.value.trim()), 350);
        });

        function updateFinalAddress() {
            finalAddr.value = selectedSuggestedAddress || addressInput.value.trim();
            document.getElementById('provinceName').value = selectedAddressParts?.province || '';
            document.getElementById('districtName').value = selectedAddressParts?.district || '';
            document.getElementById('wardName').value = selectedAddressParts?.ward || '';
            if (!selectedSuggestedAddress && pickupLatInput && pickupLngInput) {
                pickupLatInput.value = '';
                pickupLngInput.value = '';
            }
        }

        function clearSuggestions() {
            if (!suggestionBox) return;
            suggestionBox.innerHTML = '';
            suggestionBox.style.display = 'none';
        }

        function renderSuggestions(items) {
            if (!suggestionBox) return;
            if (!items.length) {
                clearSuggestions();
                return;
            }

            suggestionBox.innerHTML = items.map((item, index) => `
                <button
                    type="button"
                    data-index="${index}"
                    style="display:block;width:100%;text-align:left;padding:.75rem .9rem;border:none;border-bottom:${index === items.length - 1 ? 'none' : '1px solid #eef2f7'};background:#fff;cursor:pointer;">
                    ${item.display_name}
                </button>
            `).join('');
            suggestionBox.style.display = 'block';

            suggestionBox.querySelectorAll('button[data-index]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const picked = items[Number(btn.dataset.index)];
                    const address = picked.address || {};
                    selectedSuggestedAddress = picked.display_name;
                    selectedAddressParts = {
                        province: address.state || address.city || address.region || '',
                        district: address.county || address.state_district || address.city_district || address.town || '',
                        ward: address.suburb || address.quarter || address.neighbourhood || address.village || ''
                    };
                    addressInput.value = picked.display_name;
                    if (pickupLatInput && pickupLngInput) {
                        pickupLatInput.value = picked.lat;
                        pickupLngInput.value = picked.lon;
                    }
                    updateFinalAddress();
                    clearSuggestions();
                    showMap(parseFloat(picked.lat), parseFloat(picked.lon), picked.display_name);
                });
            });
        }

        function hideMap() {
            if (!mapPreview) return;
            mapPreview.style.display = 'none';
            if (map) {
                map.remove();
                map = null;
                marker = null;
            }
        }

        function showMap(lat, lng, label) {
            if (!mapPreview || Number.isNaN(lat) || Number.isNaN(lng)) return;
            mapPreview.style.display = 'block';

            if (map) {
                map.remove();
                map = null;
                marker = null;
            }

            map = L.map('map-preview').setView([lat, lng], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            marker = L.marker([lat, lng]).addTo(map).bindPopup(label).openPopup();
            setTimeout(() => map.invalidateSize(), 250);
        }

        async function searchAddress(query) {
            if (!query || query.length < 1) {
                clearSuggestions();
                return;
            }

            try {
                const response = await fetch(
                    'https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=6&countrycodes=vn&accept-language=vi&q='
                    + encodeURIComponent(query),
                    { headers: { Accept: 'application/json' } }
                );
                if (!response.ok) {
                    clearSuggestions();
                    return;
                }
                const data = await response.json();
                renderSuggestions(Array.isArray(data) ? data : []);
            } catch (e) {
                console.error('Error fetching address suggestions', e);
                clearSuggestions();
            }
        }

        function fetchAddressSuggestions() {
            return searchAddress(addressInput.value.trim());
        }

        addressInput.addEventListener('focus', () => {
            const query = addressInput.value.trim();
            if (query.length >= 1 && suggestionBox.children.length === 0) {
                searchAddress(query);
            } else if (suggestionBox.children.length > 0) {
                suggestionBox.style.display = 'block';
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.address-wrapper')) {
                clearSuggestions();
            }
        });
    })();
</script>
</body>
</html>
