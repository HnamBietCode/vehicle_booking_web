<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Don thue cua toi</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --muted: #64748b;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: .25rem;
            margin-left: auto;
            list-style: none;
        }

        .nav-link {
            padding: .5rem .85rem;
            border-radius: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: .9rem;
            font-weight: 500;
            transition: all .2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary);
            color: #fff;
        }

        .main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1rem;
        }

        .alert {
            padding: .85rem 1.2rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: .9rem;
            font-weight: 500;
        }

        .alert-danger {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border-left: 4px solid #10b981;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .9rem;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: #64748b;
            padding: .75rem 1rem;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: .75rem 1rem;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }

        .badge {
            display: inline-block;
            padding: .25rem .65rem;
            border-radius: 999px;
            font-size: .75rem;
            font-weight: 600;
        }

        .badge-paid {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .45rem .9rem;
            border: none;
            border-radius: 8px;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: #4f46e5;
            color: #fff;
        }

        .btn-primary:hover {
            background: #3730a3;
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .empty {
            padding: 2rem;
            text-align: center;
            color: #64748b;
        }

        .cancel-form {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
        }

        .reason-input {
            min-width: 180px;
            padding: .45rem .6rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: .82rem;
        }

        .reason-text {
            display: block;
            margin-top: .35rem;
            font-size: .8rem;
            color: #64748b;
            max-width: 280px;
            white-space: normal;
        }
    </style>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<main class="main">
    <div class="page-header">
        <h1 class="page-title">Don thue cua toi</h1>
        <a class="btn btn-primary" th:href="@{/vehicles/search}">Dat them</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card" th:if="${#lists.isEmpty(rentals)}">
        <div class="empty">Chua co don thue nao.</div>
    </div>

    <div class="card" th:if="${!#lists.isEmpty(rentals)}">
        <table>
            <thead>
            <tr>
                <th>Ma don</th>
                <th>Xe</th>
                <th>Tai xe</th>
                <th>Thoi gian</th>
                <th>Tong tien</th>
                <th>Trang thai</th>
                <th style="white-space:nowrap;">Thanh toan</th>
                <th style="white-space:nowrap;">Thao tac</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${rentals}">
                <td th:text="${'#' + r.id}"></td>
                <td th:text="${r.vehicle != null ? r.vehicle.name : r.vehicleId}"></td>
                <td th:text="${r.driver != null ? r.driver.fullName : r.driverId}"></td>
                <td th:text="${#temporals.format(r.plannedStart, 'dd/MM/yyyy HH:mm') + ' - ' + #temporals.format(r.plannedEnd, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${#numbers.formatDecimal(r.totalPrice, 0, 'COMMA', 0, 'POINT') + 'd'}"></td>
                <td th:text="${r.status}"></td>
                <td style="white-space:nowrap;">
                    <span th:if="${r.paymentStatus.name() == 'PAID'}" class="badge badge-paid">PAID</span>
                    <div th:if="${r.paymentStatus.name() == 'PENDING'}">
                        <span class="badge badge-pending">PENDING</span>
                        <form th:if="${r.status.name() != 'CANCELLED'}"
                              th:action="@{/rentals/{id}/pay(id=${r.id})}"
                              method="post"
                              style="display:inline-block; margin-left:8px;">
                            <button class="btn btn-primary" type="submit">Thanh toan</button>
                        </form>
                    </div>
                </td>
                <td style="white-space:nowrap;">
                    <form th:if="${r.status.name() != 'CANCELLED' and r.status.name() != 'COMPLETED' and r.paymentStatus.name() != 'PAID'}"
                          th:action="@{/rentals/{id}/cancel(id=${r.id})}"
                          method="post"
                          class="cancel-form">
                        <input class="reason-input" type="text" name="reason" maxlength="255"
                               placeholder="Ly do huy (tuy chon)">
                        <button class="btn btn-danger" type="submit">Huy don</button>
                    </form>
                    <span th:if="${r.status.name() == 'CANCELLED'}">
                        Da huy
                        <span class="reason-text" th:if="${r.cancelReason != null and !#strings.isEmpty(r.cancelReason)}"
                              th:text="${'Ly do: ' + r.cancelReason}"></span>
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
