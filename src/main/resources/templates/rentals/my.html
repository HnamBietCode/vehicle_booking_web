<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don thue cua toi</title>
    <style th:replace="~{layout/base :: head}"></style>
    <style>
        .live-note {
            margin-top: .4rem;
            font-size: .8rem;
            color: var(--muted);
            line-height: 1.45;
        }

        .cancel-form {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
        }

        .reason-select {
            min-width: 200px;
            padding: .45rem .6rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: .82rem;
            background: #fff;
        }

        .toast-stack {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 1200;
            display: flex;
            flex-direction: column;
            gap: .75rem;
            width: min(360px, calc(100vw - 2rem));
        }

        .live-toast {
            background: rgba(15, 23, 42, .96);
            color: #fff;
            border-radius: 14px;
            padding: 1rem 1rem .95rem;
            box-shadow: 0 18px 42px rgba(15, 23, 42, .28);
        }

        .live-toast strong {
            display: block;
            margin-bottom: .35rem;
            font-size: .95rem;
        }

        .live-toast p {
            margin: 0;
            color: rgba(255, 255, 255, .82);
            line-height: 1.45;
            font-size: .88rem;
        }

        .live-toast a {
            display: inline-flex;
            margin-top: .75rem;
            color: #fff;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<nav th:replace="~{layout/base :: navbar}"></nav>

<main class="main">
    <div class="page-header">
        <h1 class="page-title">Don thue cua toi</h1>
        <a class="btn btn-primary" th:href="@{/bookings/options}">Dat them</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card" th:if="${#lists.isEmpty(rentals)}">
        <div style="padding: 2rem; text-align: center; color: var(--muted);">Chua co don thue nao.</div>
    </div>

    <div class="card" th:if="${!#lists.isEmpty(rentals)}">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Ma don</th>
                    <th>Xe</th>
                    <th>Tai xe</th>
                    <th>Thoi gian</th>
                    <th>Tong tien</th>
                    <th>Trang thai</th>
                    <th>Thanh toan</th>
                    <th>Thao tac</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${rentals}" th:attr="data-rental-id=${r.id},data-track-url=@{/tracking/rental/{id}(id=${r.id})}">
                    <td th:text="${'#' + r.id}"></td>
                    <td th:text="${r.vehicle != null ? r.vehicle.name : r.vehicleId}"></td>
                    <td th:text="${r.driver != null ? r.driver.fullName : r.driverId}"></td>
                    <td th:text="${#temporals.format(r.plannedStart, 'dd/MM/yyyy HH:mm') + ' - ' + #temporals.format(r.plannedEnd, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${#numbers.formatDecimal(r.totalPrice, 0, 'COMMA', 0, 'POINT') + 'd'}"></td>
                    <td>
                        <span data-rental-status class="badge"
                              th:classappend="${r.status.name() == 'PENDING' ? 'badge-pending' :
                                               (r.status.name() == 'CONFIRMED' or r.status.name() == 'ACTIVE') ? 'badge-approved' :
                                               r.status.name() == 'COMPLETED' ? 'badge-active' :
                                               'badge-inactive'}"
                              th:text="${r.status}">
                        </span>
                        <div th:if="${r.cancelReason != null and !#strings.isEmpty(r.cancelReason)}"
                             style="font-size: .8rem; color: var(--muted); margin-top: .35rem;"
                             th:text="${'Ly do: ' + r.cancelReason}">
                        </div>
                    </td>
                    <td>
                        <span th:if="${r.paymentStatus.name() == 'PAID'}" class="badge badge-approved">PAID</span>
                        <div th:if="${r.paymentStatus.name() == 'PENDING' and r.status.name() == 'COMPLETED'}">
                            <span class="badge badge-pending">PENDING</span>
                            <form th:action="@{/rentals/{id}/pay(id=${r.id})}" method="post" style="display:inline-block; margin-left:8px;">
                                <button class="btn btn-primary btn-sm" type="submit">Thanh toan</button>
                            </form>
                        </div>
                    </td>
                    <td>
                        <form data-cancel-form
                              th:if="${r.status.name() == 'PENDING' or r.status.name() == 'CONFIRMED'}"
                              th:action="@{/rentals/{id}/cancel(id=${r.id})}"
                              method="post"
                              class="cancel-form">
                            <select class="reason-select" name="reason" required>
                                <option value="" disabled selected>Chon ly do huy</option>
                                <option value="Khach hang yeu cau huy don.">Khach hang yeu cau huy don</option>
                                <option value="Thay doi lich trinh.">Thay doi lich trinh</option>
                                <option value="Khong tim thay tai xe phu hop.">Khong tim thay tai xe phu hop</option>
                                <option value="Gia cao.">Gia cao</option>
                                <option value="Ly do khac.">Ly do khac</option>
                            </select>
                            <button class="btn btn-danger btn-sm" type="submit">Huy don</button>
                        </form>

                        <div data-track-slot style="margin-top:.4rem;" th:if="${r.status.name() == 'CONFIRMED' || r.status.name() == 'ACTIVE'}">
                            <a class="btn btn-primary btn-sm" th:href="@{/tracking/rental/{id}(id=${r.id})}">Theo doi</a>
                        </div>

                        <div class="live-note" data-rental-live-note></div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div id="toastStack" class="toast-stack"></div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
    const rentalIds = /*[[${rentals.![id]}]]*/ [];

    function buildBadgeClass(status) {
        if (status === 'PENDING') return 'badge badge-pending';
        if (status === 'CONFIRMED' || status === 'ACTIVE') return 'badge badge-approved';
        if (status === 'COMPLETED') return 'badge badge-active';
        return 'badge badge-inactive';
    }

    function showToast(title, message, trackingUrl) {
        const stack = document.getElementById('toastStack');
        const toast = document.createElement('div');
        toast.className = 'live-toast';
        toast.innerHTML =
            `<strong>${title}</strong>` +
            `<p>${message}</p>` +
            (trackingUrl ? `<a href="${trackingUrl}">Mo trang theo doi</a>` : '');
        stack.appendChild(toast);
        window.setTimeout(() => toast.remove(), 9000);
    }

    function handleRentalEvent(event) {
        const row = document.querySelector(`[data-rental-id="${event.tripId}"]`);
        if (!row) {
            return;
        }

        const statusBadge = row.querySelector('[data-rental-status]');
        if (statusBadge && event.status) {
            statusBadge.className = buildBadgeClass(event.status);
            statusBadge.textContent = event.status;
        }

        const cancelForm = row.querySelector('[data-cancel-form]');
        if (cancelForm && event.status && event.status !== 'PENDING' && event.status !== 'CONFIRMED') {
            cancelForm.remove();
        }

        const trackSlot = row.querySelector('[data-track-slot]');
        const trackingUrl = event.trackingUrl || row.dataset.trackUrl;
        if (trackingUrl && ['CONFIRMED', 'ACTIVE'].includes(event.status || '')) {
            const html = `<a class="btn btn-primary btn-sm" href="${trackingUrl}">Theo doi</a>`;
            if (trackSlot) {
                trackSlot.innerHTML = html;
            } else {
                const targetCell = row.lastElementChild;
                const wrapper = document.createElement('div');
                wrapper.setAttribute('data-track-slot', '');
                wrapper.style.marginTop = '.4rem';
                wrapper.innerHTML = html;
                targetCell.appendChild(wrapper);
            }
        }

        const liveNote = row.querySelector('[data-rental-live-note]');
        if (liveNote && event.message) {
            liveNote.textContent = event.message;
        }

        showToast('Cap nhat don thue', event.message || 'Don cua ban vua duoc cap nhat.', trackingUrl);
    }

    function connectRealtime() {
        if (!Array.isArray(rentalIds) || !rentalIds.length) {
            return;
        }

        const socket = new SockJS('/ws');
        const stompClient = Stomp.over(socket);
        stompClient.debug = () => {};

        stompClient.connect({}, () => {
            rentalIds.forEach((id) => {
                stompClient.subscribe(`/topic/bookings/RENTAL/${id}`, (message) => {
                    handleRentalEvent(JSON.parse(message.body));
                });
            });
        });
    }

    window.addEventListener('load', connectRealtime);
</script>
</body>
</html>
