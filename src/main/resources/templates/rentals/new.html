<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SR-Booking - Thuê xe</title>
    <style th:replace="~{layout/base :: head}"></style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        #map-preview {
            display: none;
            margin-top: 1rem;
            height: 260px;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #e3e2e8;
        }
        
        #addressSuggestions button:hover {
            background-color: #f5f3f9;
        }
    </style>
</head>

<body class="bg-background text-on-surface pb-32">
    <!-- TopAppBar -->
    <nav th:replace="~{layout/base :: navbar}"></nav>

    <main class="pt-24 pb-32 px-4 max-w-2xl mx-auto space-y-8">
        <!-- Page Title -->
        <div class="space-y-1 ml-2">
            <h1 class="text-[1.75rem] font-semibold text-primary-container leading-tight">Bắt đầu chuyến đi</h1>
            <p class="text-on-surface-variant font-medium">Hoàn tất thông tin để đặt thuê xe của bạn.</p>
        </div>

        <div th:if="${error}" class="p-4 bg-rose-100 border-l-4 border-rose-500 text-rose-700 rounded-xl shadow-sm font-medium" th:text="${error}"></div>
        <div th:if="${success}" class="p-4 bg-emerald-100 border-l-4 border-emerald-500 text-emerald-700 rounded-xl shadow-sm font-medium" th:text="${success}"></div>

        <form th:action="@{/rentals}" method="post" th:object="${form}" id="rentalForm">
            <!-- Rental Mode Toggle (Driver vs Self-drive) -->
            <input type="hidden" th:field="*{rentalMode}" id="rentalModeInput">
            <section class="bg-surface-container-low p-1 rounded-2xl flex gap-1 shadow-sm mb-8">
                <button type="button" id="btnWithDriver" onclick="setRentalMode('WITH_DRIVER')"
                    class="flex-1 py-4 px-6 rounded-xl flex items-center justify-center gap-3 transition-all duration-300"
                    th:classappend="${form.rentalMode?.name() == 'WITH_DRIVER' ? 'bg-primary-container text-white shadow-lg scale-102' : 'text-on-surface-variant hover:bg-white'}">
                    <span class="material-symbols-outlined" data-icon="person_raised_hand">person_raised_hand</span>
                    <span class="font-semibold">Có tài xế</span>
                </button>
                <button type="button" id="btnVehicleOnly" onclick="setRentalMode('VEHICLE_ONLY')"
                    class="flex-1 py-4 px-6 rounded-xl flex items-center justify-center gap-3 transition-all duration-300"
                    th:classappend="${form.rentalMode?.name() == 'VEHICLE_ONLY' ? 'bg-primary-container text-white shadow-lg scale-102' : 'text-on-surface-variant hover:bg-white'}">
                    <span class="material-symbols-outlined" data-icon="minor_crash">minor_crash</span>
                    <span class="font-semibold">Tự lái</span>
                </button>
            </section>

            <!-- Vehicle Info Card (Replaces Dropdown) -->
            <div th:if="${selectedVehicle != null}" class="bg-surface-container-lowest rounded-2xl p-6 shadow-sm mb-8 border border-outline-variant/30 flex items-center gap-6">
                <!-- Ensure vehicleId is bound to the form -->
                <input type="hidden" name="vehicleId" th:value="${selectedVehicle.id}">
                <div class="w-24 h-24 bg-surface-container rounded-xl flex items-center justify-center overflow-hidden">
                    <img th:if="${selectedVehicle.imageUrl}" th:src="${selectedVehicle.imageUrl}" class="w-full h-full object-cover">
                    <span th:unless="${selectedVehicle.imageUrl}" class="material-symbols-outlined text-4xl text-on-surface-variant">directions_car</span>
                </div>
                <div class="flex-1">
                    <h3 class="text-xl font-bold text-primary-container" th:text="${selectedVehicle.name}">Tên xe</h3>
                    <p class="text-sm text-on-surface-variant font-medium" th:text="${selectedVehicle.licensePlate}">Biển số</p>
                    <div class="mt-2 flex gap-4 text-xs font-bold text-secondary-container">
                        <span th:text="${#numbers.formatDecimal(selectedVehicle.pricePerHour, 0, 'COMMA', 0, 'POINT') + '₫ / giờ'}"></span>
                        <span th:text="${#numbers.formatDecimal(selectedVehicle.pricePerDay, 0, 'COMMA', 0, 'POINT') + '₫ / ngày'}"></span>
                    </div>
                </div>
            </div>

            <!-- Fallback if no vehicle selected (should handle gracefully) -->
            <div th:if="${selectedVehicle == null}" class="mb-8 p-6 bg-surface-container-lowest rounded-2xl border border-outline-variant/30 shadow-sm">
                <label class="text-xs font-bold uppercase tracking-widest text-primary-container/60 ml-1 mb-2 block">Chọn xe</label>
                <select th:field="*{vehicleId}" class="w-full bg-surface-container-low border-none rounded-xl py-4 px-4 text-on-surface focus:ring-2 focus:ring-primary-container transition-all" required>
                    <option value="">-- Chọn xe --</option>
                    <option th:each="v : ${vehicles}" th:value="${v.id}" th:text="${v.name + ' (' + v.licensePlate + ')'}" 
                            th:attr="data-price-hour=${v.pricePerHour},data-price-day=${v.pricePerDay}"></option>
                </select>
            </div>

            <!-- Form Content -->
            <div class="bg-surface-container-lowest rounded-2xl p-6 shadow-[0_4px_24px_rgba(0,16,62,0.04)] space-y-8">
                <!-- Rental Type -->
                <div class="space-y-4">
                    <label class="text-xs font-bold uppercase tracking-widest text-primary-container/60 ml-1">Hình thức thuê</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label th:each="t : ${rentalTypes}" class="relative flex items-center justify-center p-4 rounded-xl border-2 transition-all cursor-pointer group"
                               th:classappend="${form.rentalType == t ? 'border-primary-container bg-primary-container/5' : 'border-outline-variant hover:border-primary-container/30'}">
                            <input type="radio" th:field="*{rentalType}" th:value="${t}" class="hidden" onchange="this.form.submit()">
                            <div class="flex flex-col items-center gap-1">
                                <span class="font-semibold" th:classappend="${form.rentalType == t ? 'text-primary-container' : 'text-on-surface-variant'}" th:text="${t}">DAILY</span>
                                <span class="text-[10px] text-on-surface-variant uppercase tracking-tighter" th:text="${t.name() == 'DAILY' ? 'Theo ngày' : 'Theo giờ'}"></span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Pickup Location Group -->
                <div class="space-y-4">
                    <label class="text-xs font-bold uppercase tracking-widest text-primary-container/60 ml-1">Điểm đón</label>
                    
                    <div class="flex gap-4 mb-2 ml-1">
                        <label class="flex items-center gap-2 cursor-pointer text-sm font-medium">
                            <input type="radio" name="pickupMode" value="POINT" checked class="text-primary-container focus:ring-primary-container">
                            Chọn điểm sẵn có
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer text-sm font-medium">
                            <input type="radio" name="pickupMode" value="MANUAL" class="text-primary-container focus:ring-primary-container">
                            Tự nhập địa chỉ
                        </label>
                    </div>

                    <!-- Existing Points -->
                    <div id="pointSelect">
                        <select th:field="*{pickupPointId}" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 text-on-surface focus:ring-2 focus:ring-secondary transition-all appearance-none shadow-sm">
                            <option value="">-- Chọn điểm đón --</option>
                            <option th:each="p : ${pickupPoints}" th:value="${p.id}" th:text="${p.name + ' - ' + p.address}"></option>
                        </select>
                    </div>

                    <!-- Manual Input -->
                    <div id="manualInput" class="hidden space-y-4">
                        <div class="relative address-wrapper">
                            <input type="text" id="manualPickupAddress" class="w-full bg-surface-container-low border-none rounded-xl py-4 px-4 text-on-surface focus:ring-2 focus:ring-secondary transition-all shadow-sm" 
                                   placeholder="Địa chỉ cụ thể (Số nhà, tên đường...)">
                            <div id="addressSuggestions" class="hidden absolute left-0 right-0 mt-2 bg-white rounded-xl shadow-xl border border-outline-variant z-50 overflow-hidden"></div>
                        </div>
                        <div id="map-preview"></div>
                        <input type="hidden" th:field="*{pickupAddress}">
                        <input type="hidden" th:field="*{pickupLat}">
                        <input type="hidden" th:field="*{pickupLng}">
                    </div>
                </div>

                <!-- Time Schedule & Duration -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <label class="text-xs font-bold uppercase tracking-widest text-primary-container/60 ml-1">Thời điểm nhận xe</label>
                        <input th:field="*{plannedStart}" id="plannedStartInput" class="w-full bg-surface-container-low border-none rounded-xl py-4 px-4 text-on-surface focus:ring-2 focus:ring-secondary transition-all shadow-sm" type="datetime-local" required />
                    </div>
                    <div class="space-y-4">
                        <label id="durationLabel" class="text-xs font-bold uppercase tracking-widest text-primary-container/60 ml-1">Số giờ thuê</label>
                        <div class="relative">
                            <input th:field="*{duration}" id="durationInput" type="number" min="1" step="1" 
                                   class="w-full bg-surface-container-low border-none rounded-xl py-4 px-4 text-on-surface focus:ring-2 focus:ring-secondary transition-all shadow-sm" 
                                   placeholder="VD: 5" required />
                            <span id="durationUnit" class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-bold text-on-surface-variant">giờ</span>
                        </div>
                        <input type="hidden" th:field="*{plannedEnd}" id="plannedEndInput">
                    </div>
                </div>

                <!-- Notes -->
                <div class="space-y-4">
                    <label class="text-xs font-bold uppercase tracking-widest text-primary-container/60 ml-1">Ghi chú</label>
                    <textarea th:field="*{notes}" class="w-full bg-surface-container-low border-none rounded-xl py-4 px-4 text-on-surface focus:ring-2 focus:ring-secondary transition-all resize-none shadow-sm" 
                              placeholder="Yêu cầu thêm cho tài xế hoặc xe..." rows="3"></textarea>
                </div>
            </div>

            <!-- Cost Summary Card -->
            <div class="bg-primary-container text-white rounded-2xl p-6 shadow-xl space-y-4 overflow-hidden relative mt-8">
                <div class="absolute -right-8 -top-8 w-32 h-32 bg-secondary-container/20 rounded-full blur-3xl"></div>
                <h3 class="text-lg font-semibold flex items-center gap-2">
                    <span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
                    Tóm tắt chi phí
                </h3>
                <div class="space-y-3 relative z-10">
                    <div class="flex justify-between text-on-primary-container/80 text-sm">
                        <span>Giá thuê cơ bản</span>
                        <span id="basePrice">--</span>
                    </div>
                    <div id="driverFeeRow" class="flex justify-between text-on-primary-container/80 text-sm hidden">
                        <span>Phí tài xế (Tạm tính)</span>
                        <span>100,000₫ / giờ</span>
                    </div>
                    <div class="pt-3 border-t border-white/10 flex justify-between items-center">
                        <span class="text-lg font-medium">Tạm tính</span>
                        <span id="estimateValue" class="text-2xl font-bold text-secondary-container">--</span>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <div class="pt-8">
                <button type="submit" class="w-full bg-secondary-container text-white py-5 rounded-2xl font-bold text-lg shadow-[0_8px_30px_rgba(254,106,52,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-200 uppercase tracking-widest">
                    Đặt xe ngay
                </button>
            </div>
        </form>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const selectedVehiclePriceHour = /*[[${selectedVehicle?.pricePerHour}]]*/ 0;
        const selectedVehiclePriceDay = /*[[${selectedVehicle?.pricePerDay}]]*/ 0;
        const hasPreselectedVehicle = /*[[${selectedVehicle != null}]]*/ false;
        /*]]>*/

        function setRentalMode(mode) {
            document.getElementById('rentalModeInput').value = mode;
            // Update UI toggles
            const btnWithDriver = document.getElementById('btnWithDriver');
            const btnVehicleOnly = document.getElementById('btnVehicleOnly');
            
            if (mode === 'WITH_DRIVER') {
                btnWithDriver.classList.add('bg-primary-container', 'text-white', 'shadow-lg', 'scale-102');
                btnWithDriver.classList.remove('text-on-surface-variant', 'hover:bg-white');
                btnVehicleOnly.classList.remove('bg-primary-container', 'text-white', 'shadow-lg', 'scale-102');
                btnVehicleOnly.classList.add('text-on-surface-variant', 'hover:bg-white');
                document.getElementById('driverFeeRow').classList.remove('hidden');
            } else {
                btnVehicleOnly.classList.add('bg-primary-container', 'text-white', 'shadow-lg', 'scale-102');
                btnVehicleOnly.classList.remove('text-on-surface-variant', 'hover:bg-white');
                btnWithDriver.classList.remove('bg-primary-container', 'text-white', 'shadow-lg', 'scale-102');
                btnWithDriver.classList.add('text-on-surface-variant', 'hover:bg-white');
                document.getElementById('driverFeeRow').classList.add('hidden');
            }
            updateEstimate();
        }

        const pickupModeRadios = document.querySelectorAll('input[name="pickupMode"]');
        const pointSelect = document.getElementById('pointSelect');
        const manualInput = document.getElementById('manualInput');
        const addressInput = document.getElementById('manualPickupAddress');
        const suggestionBox = document.getElementById('addressSuggestions');
        const mapPreview = document.getElementById('map-preview');
        const pickupAddressField = document.getElementById('pickupAddress');
        const pickupLatField = document.getElementById('pickupLat');
        const pickupLngField = document.getElementById('pickupLng');

        let map = null;
        let suggestionTimer = null;

        function syncPickupMode() {
            const mode = [...pickupModeRadios].find(r => r.checked)?.value || 'POINT';
            if (mode === 'POINT') {
                pointSelect.classList.remove('hidden');
                manualInput.classList.add('hidden');
                pickupAddressField.value = '';
                pickupLatField.value = '';
                pickupLngField.value = '';
            } else {
                pointSelect.classList.add('hidden');
                manualInput.classList.remove('hidden');
            }
        }

        pickupModeRadios.forEach(r => r.addEventListener('change', syncPickupMode));

        // Address Suggestions Logic
        async function searchAddress(query) {
            if (query.length < 3) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=5&countrycodes=vn&q=${encodeURIComponent(query)}`);
                const items = await res.json();
                renderSuggestions(items);
            } catch (e) { console.error(e); }
        }

        function renderSuggestions(items) {
            suggestionBox.innerHTML = items.map(item => `
                <button type="button" class="w-full text-left px-4 py-3 text-sm border-b border-outline-variant last:border-none transition-colors"
                        onclick="selectAddress('${item.display_name}', ${item.lat}, ${item.lon})">
                    ${item.display_name}
                </button>
            `).join('');
            suggestionBox.classList.remove('hidden');
        }

        function selectAddress(display, lat, lng) {
            addressInput.value = display;
            pickupAddressField.value = display;
            pickupLatField.value = lat;
            pickupLngField.value = lng;
            suggestionBox.classList.add('hidden');
            showMap(lat, lng, display);
        }

        function showMap(lat, lng, label) {
            mapPreview.style.display = 'block';
            if (map) map.remove();
            map = L.map('map-preview').setView([lat, lng], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([lat, lng]).addTo(map).bindPopup(label).openPopup();
            setTimeout(() => map.invalidateSize(), 200);
        }

        addressInput.addEventListener('input', (e) => {
            if (suggestionTimer) clearTimeout(suggestionTimer);
            suggestionTimer = setTimeout(() => searchAddress(e.target.value), 400);
        });

        function syncDurationUI() {
            const type = document.querySelector('input[name="rentalType"]:checked')?.value;
            const label = document.getElementById('durationLabel');
            const unit = document.getElementById('durationUnit');
            const input = document.getElementById('durationInput');

            if (type === 'DAILY') {
                label.innerText = 'Số ngày thuê';
                unit.innerText = 'ngày';
                input.placeholder = 'VD: 3';
            } else {
                label.innerText = 'Số giờ thuê';
                unit.innerText = 'giờ';
                input.placeholder = 'VD: 5';
            }
            updateEstimate();
        }

        // Price Estimation
        const fmt = (n) => new Intl.NumberFormat('vi-VN').format(n) + '₫';
        
        function updateEstimate() {
            const startStr = document.getElementById('plannedStartInput').value;
            const duration = parseFloat(document.getElementById('durationInput').value);
            const type = document.querySelector('input[name="rentalType"]:checked')?.value;
            const mode = document.getElementById('rentalModeInput').value;
            
            let priceHour = 0, priceDay = 0;
            if (hasPreselectedVehicle) {
                priceHour = selectedVehiclePriceHour;
                priceDay = selectedVehiclePriceDay;
            } else {
                const vehSelect = document.getElementById('vehicleId');
                const opt = vehSelect?.options[vehSelect.selectedIndex];
                if (opt) {
                    priceHour = parseFloat(opt.dataset.priceHour || 0);
                    priceDay = parseFloat(opt.dataset.priceDay || 0);
                }
            }

            const basePriceEl = document.getElementById('basePrice');
            const estimateValueEl = document.getElementById('estimateValue');

            if (!startStr || !duration || duration <= 0 || (!priceHour && !priceDay)) {
                basePriceEl.innerText = '--';
                estimateValueEl.innerText = '--';
                return;
            }

            // Calculate plannedEnd for form submission
            const s = new Date(startStr);
            const e = new Date(s);
            if (type === 'DAILY') {
                e.setDate(s.getDate() + duration);
            } else {
                e.setHours(s.getHours() + duration);
            }
            
            // Format to yyyy-MM-ddTHH:mm for datetime-local hidden input
            const pad = (n) => n.toString().padStart(2, '0');
            const endStr = `${e.getFullYear()}-${pad(e.getMonth()+1)}-${pad(e.getDate())}T${pad(e.getHours())}:${pad(e.getMinutes())}`;
            document.getElementById('plannedEndInput').value = endStr;

            let base = 0;
            if (type === 'DAILY') {
                base = duration * priceDay;
            } else {
                base = duration * priceHour;
            }

            basePriceEl.innerText = fmt(base);
            
            let total = base;
            if (mode === 'WITH_DRIVER') {
                // Approximate driver fee: 100k/hour. If daily, 100k * 10 hours/day maybe?
                const hours = type === 'DAILY' ? duration * 10 : duration; 
                total += (hours * 100000);
            }
            
            estimateValueEl.innerText = fmt(total);
        }

        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('change', updateEstimate);
            el.addEventListener('input', updateEstimate);
        });
        
        // Rental Type change also needs to sync UI
        document.querySelectorAll('input[name="rentalType"]').forEach(el => {
            el.addEventListener('change', syncDurationUI);
        });

        // Initialize state
        syncDurationUI();
        setRentalMode(document.getElementById('rentalModeInput').value || 'VEHICLE_ONLY');
    </script>
</body>

</html>
