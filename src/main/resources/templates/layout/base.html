<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - VehicleBook' : 'VehicleBook'}">VehicleBook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --accent: #F59E0B;
            --danger: #EF4444;
            --success: #10B981;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text: #1E293B;
            --muted: #64748B;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* â”€â”€ Navbar â”€â”€ */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .navbar-brand::before {
            content: '🚗';
            font-size: 1.4rem;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            gap: .25rem;
            margin-left: auto;
            list-style: none;
            flex-wrap: nowrap;
        }

        .nav-link {
            padding: .5rem .85rem;
            border-radius: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: .9rem;
            font-weight: 500;
            transition: all .2s;
            white-space: nowrap;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary);
            color: #fff;
        }

        .nav-badge {
            background: var(--accent);
            color: #fff;
            font-size: .7rem;
            padding: .15rem .45rem;
            border-radius: 999px;
            margin-left: .3rem;
            font-weight: 700;
        }

        /* â”€â”€ Main layout â”€â”€ */
        .main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* â”€â”€ Alerts â”€â”€ */
        .alert {
            padding: .85rem 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            font-size: .9rem;
            font-weight: 500;
        }

        .alert-danger {
            background: #FEF2F2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
        }

        .alert-success {
            background: #F0FDF4;
            color: #166534;
            border-left: 4px solid var(--success);
        }

        /* â”€â”€ Card â”€â”€ */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: var(--text);
        }

        /* â”€â”€ Form â”€â”€ */
        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-label {
            display: block;
            font-size: .875rem;
            font-weight: 600;
            margin-bottom: .4rem;
            color: var(--text);
        }

        .form-control {
            width: 100%;
            padding: .65rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: .95rem;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .15);
        }

        select.form-control {
            cursor: pointer;
        }

        /* â”€â”€ Buttons â”€â”€ */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .6rem 1.3rem;
            border: none;
            border-radius: 8px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            opacity: .9;
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-sm {
            padding: .35rem .8rem;
            font-size: .8rem;
        }

        .btn-warning {
            background: var(--accent);
            color: #fff;
        }

        /* â”€â”€ Table â”€â”€ */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .9rem;
        }

        th {
            background: var(--bg);
            font-weight: 600;
            color: var(--muted);
            padding: .75rem 1rem;
            text-align: left;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: .75rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:hover td {
            background: #f8fafc;
        }

        /* â”€â”€ Badge â”€â”€ */
        .badge {
            display: inline-block;
            padding: .25rem .65rem;
            border-radius: 999px;
            font-size: .75rem;
            font-weight: 600;
        }

        .badge-admin {
            background: #EDE9FE;
            color: #5B21B6;
        }

        .badge-customer {
            background: #DBEAFE;
            color: #1D4ED8;
        }

        .badge-driver {
            background: #D1FAE5;
            color: #065F46;
        }

        .badge-premium {
            background: #FEF3C7;
            color: #92400E;
        }

        .badge-standard {
            background: #F1F5F9;
            color: var(--muted);
        }

        .badge-active {
            background: #D1FAE5;
            color: #065F46;
        }

        .badge-inactive {
            background: #FEE2E2;
            color: #991B1B;
        }

        .badge-pending {
            background: #FEF3C7;
            color: #92400E;
        }

        .badge-approved {
            background: #D1FAE5;
            color: #065F46;
        }

        .badge-rejected {
            background: #FEE2E2;
            color: #991B1B;
        }

        /* â”€â”€ Page Header â”€â”€ */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* â”€â”€ Detail list â”€â”€ */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        @media(max-width:600px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        .detail-item label {
            font-size: .8rem;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .detail-item p {
            margin-top: .25rem;
            font-weight: 500;
        }

        /* â”€â”€ Premium card â”€â”€ */
        .premium-hero {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: #fff;
            border-radius: var(--radius);
            padding: 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .premium-hero h1 {
            font-size: 2rem;
            margin-bottom: .5rem;
        }

        .premium-hero p {
            opacity: .85;
            margin-bottom: 1.5rem;
        }

        .plan-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
        }

        .plan-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
            transition: border-color .2s, box-shadow .2s;
        }

        .plan-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 20px rgba(79, 70, 229, .12);
        }

        .plan-card .price {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: .5rem 0;
        }

        .plan-card .months {
            font-size: .85rem;
            color: var(--muted);
        }
    </style>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#0a2463",
                        "on-primary-container": "#7a8ed2",
                        "secondary-container": "#fe6a34",
                        "background": "#faf8ff",
                        "on-surface": "#1b1b20",
                        "on-surface-variant": "#444650",
                        "outline-variant": "#c5c6d2"
                    },
                    fontFamily: {
                        "headline": ["Be Vietnam Pro"],
                        "body": ["Be Vietnam Pro"]
                    }
                }
            }
        }
    </script>
    <th:block th:fragment="head">
        <!-- child page styles slot -->
    </th:block>
</head>

<body class="bg-background text-on-surface">
    <!-- Modern Navbar -->
    <header th:fragment="navbar" class="fixed top-0 w-full z-50 bg-white shadow-[0_2px_15px_rgba(0,0,0,0.05)]">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <!-- Brand -->
            <div class="flex items-center gap-12">
                <a href="/" class="text-2xl font-extrabold text-[#0A2463] tracking-tight">SR-Booking</a>
                
                <!-- Desktop Navigation Links -->
                <nav class="hidden md:flex items-center gap-8" th:with="user=${session != null and session.loggedUser != null ? session.loggedUser : loggedUser}">
                    <a href="/" class="text-sm font-bold transition-all relative group"
                       th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/' ? 'text-secondary-container' : 'text-on-surface-variant hover:text-primary-container'}">
                        Trang chủ
                        <div th:if="${#httpServletRequest != null and #httpServletRequest.requestURI == '/'}" class="absolute -bottom-1 left-0 right-0 h-0.5 bg-secondary-container"></div>
                    </a>

                    <th:block th:if="${user != null}">
                        <a th:if="${user?.role?.name() == 'CUSTOMER'}" th:href="@{/vehicles/search}" class="text-sm font-bold transition-all relative group"
                           th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI != null and #httpServletRequest.requestURI.startsWith('/vehicles') ? 'text-secondary-container' : 'text-on-surface-variant hover:text-primary-container'}">
                            Thuê xe
                            <div th:if="${#httpServletRequest != null and #httpServletRequest.requestURI != null and #httpServletRequest.requestURI.startsWith('/vehicles')}" class="absolute -bottom-1 left-0 right-0 h-0.5 bg-secondary-container"></div>
                        </a>
                        
                        <a th:if="${user?.role?.name() == 'CUSTOMER'}" th:href="@{/sober-bookings/new}" class="text-sm font-bold transition-all relative group"
                           th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI != null and #httpServletRequest.requestURI.startsWith('/sober-bookings') ? 'text-secondary-container' : 'text-on-surface-variant hover:text-primary-container'}">
                            Lái hộ
                            <div th:if="${#httpServletRequest != null and #httpServletRequest.requestURI != null and #httpServletRequest.requestURI.startsWith('/sober-bookings')}" class="absolute -bottom-1 left-0 right-0 h-0.5 bg-secondary-container"></div>
                        </a>

                        <a th:if="${user?.role?.name() == 'CUSTOMER'}" th:href="@{/booking-history}" class="text-sm font-bold transition-all relative group"
                           th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI != null and #httpServletRequest.requestURI.startsWith('/booking-history') ? 'text-secondary-container' : 'text-on-surface-variant hover:text-primary-container'}">
                            Lịch sử
                            <div th:if="${#httpServletRequest != null and #httpServletRequest.requestURI != null and #httpServletRequest.requestURI.startsWith('/booking-history')}" class="absolute -bottom-1 left-0 right-0 h-0.5 bg-secondary-container"></div>
                        </a>

                        <a th:href="@{/wallet}" class="text-sm font-bold transition-all relative group"
                           th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI != null and #httpServletRequest.requestURI.startsWith('/wallet') ? 'text-secondary-container' : 'text-on-surface-variant hover:text-primary-container'}">
                            Ví
                            <div th:if="${#httpServletRequest != null and #httpServletRequest.requestURI != null and #httpServletRequest.requestURI.startsWith('/wallet')}" class="absolute -bottom-1 left-0 right-0 h-0.5 bg-secondary-container"></div>
                        </a>
                    </th:block>

                    <!-- Guest Mode Links if needed -->
                    <th:block th:if="${user == null}">
                        <a th:href="@{/vehicles/search}" class="text-sm font-bold text-on-surface-variant hover:text-primary-container transition-all">Thuê xe</a>
                        <a th:href="@{/auth/login}" class="text-sm font-bold text-on-surface-variant hover:text-primary-container transition-all">Đăng nhập</a>
                        <a th:href="@{/auth/register}" class="px-4 py-2 bg-primary-container text-white rounded-lg text-sm font-bold hover:scale-105 transition-all">Đăng ký</a>
                    </th:block>
                </nav>
            </div>

            <!-- Profile & Logout -->
            <div class="flex items-center gap-6" th:with="user=${session != null and session.loggedUser != null ? session.loggedUser : loggedUser}">
                <th:block th:if="${user != null}">
                    <a th:href="@{/profile}" class="text-sm font-bold text-[#0A2463] hover:text-secondary-container transition-all flex items-center gap-2">
                        Hồ sơ cá nhân
                    </a>

                    <!-- 🔔 Notification Bell -->
                    <div class="relative" id="notifBellWrap" style="position:relative;">
                        <button id="notifBell" onclick="toggleNotifDropdown()" style="background:none;border:none;cursor:pointer;font-size:1.5rem;position:relative;padding:4px 8px;">
                            🔔
                            <span id="notifBadge" style="display:none;position:absolute;top:0;right:0;background:#EF4444;color:#fff;font-size:.6rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;padding:0 4px;line-height:16px;text-align:center;">0</span>
                        </button>
                        <div id="notifDropdown" style="display:none;position:absolute;right:0;top:100%;width:360px;max-height:420px;overflow-y:auto;background:#fff;border:1px solid #E2E8F0;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:999;padding:0;">
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #E2E8F0;">
                                <span style="font-weight:700;font-size:.95rem;">Thông báo</span>
                                <a href="/notifications" style="font-size:.8rem;color:#4F46E5;text-decoration:none;font-weight:600;">Xem tất cả →</a>
                            </div>
                            <div id="notifList" style="padding:4px 0;">
                                <div style="text-align:center;padding:1.5rem;color:#94A3B8;font-size:.85rem;">Đang tải...</div>
                            </div>
                            <div style="padding:8px 16px;border-top:1px solid #E2E8F0;text-align:center;">
                                <button onclick="markAllReadFromDropdown()" style="background:none;border:none;color:#4F46E5;font-size:.8rem;font-weight:600;cursor:pointer;">✓ Đánh dấu tất cả đã đọc</button>
                            </div>
                        </div>
                    </div>

                    <a th:href="@{/auth/logout}" class="flex items-center gap-1.5 px-4 py-2 rounded-lg bg-rose-50 text-rose-600 hover:bg-rose-100 transition-all text-sm font-semibold" title="Đăng xuất">
                        <span class="material-symbols-outlined text-[18px]">logout</span>
                        Đăng xuất
                    </a>
                </th:block>
            </div>
        </div>
    </header>

    <!-- â”€â”€â”€ Main content slot â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
    <main class="main" th:fragment="main">
        <!-- child page content fills here -->
    </main>

    <!-- Notification bell script -->
    <script>
        function toggleNotifDropdown() {
            const dd = document.getElementById('notifDropdown');
            if (!dd) return;
            const isHidden = dd.style.display === 'none';
            dd.style.display = isHidden ? 'block' : 'none';
            if (isHidden) loadLatestNotifs();
        }
        document.addEventListener('click', function(e) {
            const wrap = document.getElementById('notifBellWrap');
            const dd = document.getElementById('notifDropdown');
            if (wrap && dd && !wrap.contains(e.target)) dd.style.display = 'none';
        });
        async function updateNotifCount() {
            try {
                const r = await fetch('/api/notifications/count');
                if (!r.ok) return;
                const d = await r.json();
                const badge = document.getElementById('notifBadge');
                if (badge) {
                    if (d.count > 0) { badge.textContent = d.count > 99 ? '99+' : d.count; badge.style.display = ''; }
                    else { badge.style.display = 'none'; }
                }
            } catch(e) {}
        }
        async function loadLatestNotifs() {
            try {
                const r = await fetch('/api/notifications/latest');
                if (!r.ok) return;
                const list = await r.json();
                const container = document.getElementById('notifList');
                if (!container) return;
                if (list.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:1.5rem;color:#94A3B8;font-size:.85rem;">Không có thông báo</div>';
                    return;
                }
                container.innerHTML = list.map(n => {
                    const unread = !n.isRead;
                    const time = new Date(n.createdAt).toLocaleString('vi-VN');
                    return '<div onclick="markNotifRead('+n.id+', this)" style="padding:10px 16px;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background .2s;'+(unread?'background:#F8F7FF;border-left:3px solid #4F46E5;':'')+'">'
                        + '<div style="font-weight:'+(unread?'700':'500')+';font-size:.85rem;color:#1E293B;">'+n.title+'</div>'
                        + '<div style="font-size:.78rem;color:#64748B;margin-top:2px;line-height:1.4;">'+n.body+'</div>'
                        + '<div style="font-size:.7rem;color:#94A3B8;margin-top:4px;">'+time+'</div>'
                        + '</div>';
                }).join('');
            } catch(e) {}
        }
        async function markNotifRead(id, el) {
            await fetch('/api/notifications/' + id + '/read', { method: 'POST' });
            if (el) { el.style.background = ''; el.style.borderLeft = ''; }
            updateNotifCount();
        }
        async function markAllReadFromDropdown() {
            await fetch('/api/notifications/read-all', { method: 'POST' });
            updateNotifCount();
            loadLatestNotifs();
        }
        updateNotifCount();
        setInterval(updateNotifCount, 30000);
    </script>

</body>

</html>
