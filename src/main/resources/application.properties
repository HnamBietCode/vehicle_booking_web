spring.application.name=sr

# ============================================================
# DATABASE - MySQL
# Mỗi người tự tạo file application-local.properties để ghi đè
# username/password theo máy của mình (file đó KHÔNG commit lên Git)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/vehicle_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# validate: Hibernate chỉ kiểm tra schema, KHÔNG tự tạo/xoá bảng
# (schema.sql đã lo việc tạo bảng rồi)
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================================= ===================
# SPRING SQL INIT
# Spring Boot sẽ tự chạy schema.sql rồi data.sql mỗi khi app khởi động
# schema.sql dùng CREATE TABLE IF NOT EXISTS -> an toàn, không tạo lại nếu đã có
# data.sql   dùng INSERT IGNORE          -> an toàn, không insert trùng
# ============================================================
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.encoding=UTF-8

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-part-count=50
app.upload.dir=uploads/vehicles

# ============================================================
# SERVER
# ============================================================
spring.web.resources.cache.period=0
server.port=8080
# Session timeout dài để tiện test (4 giờ)
server.servlet.session.timeout=14400

# ============================================================
# ENCODING
# ============================================================
spring.thymeleaf.encoding=UTF-8
spring.web.encoding.charset=UTF-8
spring.web.encoding.enabled=true
spring.web.encoding.force=true

